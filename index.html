const STRATS = [
  {name:"Covered Call",type:"sell",margin:false},
  {name:"Cash-Secured Put",type:"sell",margin:false},
  {name:"Bull Put Spread",type:"sell",margin:false},

  {name:"Diagonal Spread",type:"sell",margin:false},
  {name:"Calendar Spread",type:"sell",margin:false},

  {name:"Naked Put",type:"sell",margin:true},

];

const MARGIN_STRATS = STRATS.filter(s=>s.margin).map(s=>s.name);

const ASSIGN_STRATS = ["Covered Call","Cash-Secured Put"];

const STOCK_STATUSES = ["Holding","Sold","Assigned Away"];

// ─── Helpers ──────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const pN = v => parseFloat(v)||0;
const fmtD = n => "$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const gd = s => SMAP[s]||{type:"sell",margin:false};
const oq = t => 100*(parseInt(t.contracts)||1);
const dte = d => !d?null:Math.ceil((new Date(d+"T23:59:59")-new Date())/86400000);
const genCode = () => Math.random().toString(36).substring(2,8).toUpperCase();

const rtr = r => ({

});

});
const rts = r => ({

});
const str = (s,uid) => ({
  user_id:uid, ticker:(s.ticker||"").toUpperCase(), shares:parseInt(s.shares)||0,
  buy_price:pN(s.buyPrice)||null, buy_date:s.buyDate||null,

  sell_price:pN(s.sellPrice)||null, sell_date:s.sellDate||null, notes:s.notes||null,
});

// ─── Calculations ─────────────────────────────────────────────────────────────
const calcPnl = t => {
  if (!t.premium||!t.currentValue) return null;
  const diff = pN(t.premium)-pN(t.currentValue);
  return gd(t.strategy).type==="sell" ? diff*oq(t) : -diff*oq(t);
};
const calcMax = t => {
  const q=oq(t), p=pN(t.premium)*q;
  if (t.strategy==="Covered Call"&&t.costBasis&&t.strikeShort)
    return p+(pN(t.strikeShort)-pN(t.costBasis))*q;
  return p;
};
const calcPct = t => {
  if (gd(t.strategy).type!=="sell"||!t.premium||!t.currentValue) return null;
  const mp=calcMax(t); if(mp<=0) return null;
  return ((pN(t.premium)-pN(t.currentValue))*oq(t)/mp)*100;
};
const calcDiv = t => (!t.divAmount||!t.divCount||parseInt(t.divCount)===0)?0:pN(t.divAmount)*parseInt(t.divCount)*oq(t);
const calcYld = t => (!t.premium||!t.stockPrice)?null:(pN(t.premium)/pN(t.stockPrice))*100;
const calcStkPnl = s => {
  const sh=parseInt(s.shares)||0, cost=pN(s.buyPrice)*sh;
  if (!s.buyPrice||!sh) return null;
  if (s.status==="Holding"&&s.currentPrice) return pN(s.currentPrice)*sh-cost;
  if ((s.status==="Sold"||s.status==="Assigned Away")&&s.sellPrice) return pN(s.sellPrice)*sh-cost;
  return null;
};
const calcTotal = (trades,stocks,sb2) => {
  const start=pN(sb2);
  const optImp=trades.reduce((s,t)=>{
    if(!t.premium) return s;
    const p=pN(t.premium)*oq(t), sell=gd(t.strategy).type==="sell";
    const cv=t.status==="Closed"&&t.currentValue?pN(t.currentValue)*oq(t):0;
    return sell?s+p-cv:s-p+cv;
  },0);
  const stkImp=stocks.reduce((s,st)=>{
    const sh=parseInt(st.shares)||0; if(!st.buyPrice||!sh) return s;
    let imp=-pN(st.buyPrice)*sh;
    if((st.status==="Sold"||st.status==="Assigned Away")&&st.sellPrice) imp+=pN(st.sellPrice)*sh;
    return s+imp;
  },0);
  const divInc=trades.reduce((s,t)=>s+calcDiv(t),0);
  const cash=start+optImp+stkImp+divInc;
  const optMark=trades.filter(t=>t.status==="Open"&&t.currentValue).reduce((s,t)=>{
    const cv=pN(t.currentValue)*oq(t);
    return gd(t.strategy).type==="sell"?s-cv:s+cv;
  },0);
  const stkMkt=stocks.filter(s=>s.status==="Holding"&&s.currentPrice)
    .reduce((s,st)=>s+pN(st.currentPrice)*(parseInt(st.shares)||0),0);
  return {cash,optMark,stkMkt,total:cash+optMark+stkMkt,divInc,optImp,stkImp};
};

// ─── PnlCell ──────────────────────────────────────────────────────────────────
function PnlCell({trade,onUpdate}) {
  const [edit,setEdit]=useState(false);
  const [val,setVal]=useState(trade.currentValue||"");
  const pnl=calcPnl(trade), pct=calcPct(trade), mp=calcMax(trade), div=calcDiv(trade);
  const col=pnl===null?"#aaa":pnl>=0?F.green:F.red;
  return e("div",null,
    e("div",{style:{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}},
      !edit?[
        e("span",{key:"v",style:{fontWeight:700,color:col}},pnl===null?"—":`${pnl>=0?"+":"-"}${fmtD(pnl)}`),
        trade.status==="Open"&&e("button",{key:"eb",onClick:()=>{setVal(trade.currentValue||"");setEdit(true);},style:{background:"none",border:`1px solid ${F.borderLight}`,borderRadius:2,fontSize:10,color:F.blueLink,cursor:"pointer",padding:"1px 5px"}},"Edit")
      ]:[
        e("input",{key:"i",autoFocus:true,value:val,onChange:ev=>setVal(ev.target.value),style:{width:64,padding:"2px 5px",fontSize:12,border:`1px solid ${F.green}`,borderRadius:2,outline:"none"},
          onKeyDown:ev=>{if(ev.key==="Enter"){onUpdate(trade.id,val);setEdit(false);}if(ev.key==="Escape")setEdit(false);}}),
        e("button",{key:"ok",onClick:()=>{onUpdate(trade.id,val);setEdit(false);},style:{background:F.green,color:"#fff",border:"none",borderRadius:2,fontSize:10,cursor:"pointer",padding:"2px 6px"}},"✓"),
        e("button",{key:"x",onClick:()=>setEdit(false),style:{background:"#fff",color:F.textMuted,border:`1px solid ${F.borderLight}`,borderRadius:2,fontSize:10,cursor:"pointer",padding:"2px 5px"}},"✕"),
      ]
    ),
    pct!==null&&e("div",{style:{marginTop:3}},
      e("div",{style:{height:3,background:"#e0e0e0",borderRadius:2,width:80}},
        e("div",{style:{height:3,background:pct>=50?F.green:F.gold,borderRadius:2,width:`${Math.min(100,Math.max(0,pct))}%`}})
      ),
      e("div",{style:{fontSize:10,color:F.textMuted,marginTop:1}},`${pct.toFixed(0)}% of ${fmtD(mp)} max`)
    ),
    div>0&&e("div",{style:{fontSize:10,color:F.purple,marginTop:2,fontWeight:600}},`💰 +${fmtD(div)} div`)
  );
}

// ─── Assignment Panel ─────────────────────────────────────────────────────────
function AssignPanel({t}) {
  const strike=pN(t.strikeShort), prem=pN(t.premium);
  if (!strike||!prem) return null;
  const q=oq(t), pt=prem*q, basis=pN(t.costBasis)||null;
  const isCsp=t.strategy==="Cash-Secured Put";
  const ap=basis?(isCsp?(strike-basis)*q*-1+pt:(strike-basis)*q+pt):null;
  const be=basis?basis-prem:null;
  const ec=isCsp?strike-prem:null;
  return e("div",{style:{background:F.indigoLight,border:`1px solid ${F.indigoBorder}`,borderRadius:4,overflow:"hidden",marginBottom:14}},
    e("div",{style:{background:F.indigo,color:"#fff",padding:"7px 14px",fontSize:12,fontWeight:700}},`⚖️ Assignment Risk — ${t.ticker} · Strike $${strike.toFixed(2)}`),
    e("div",{style:{padding:"10px 14px",fontSize:12}},
      e("div",{style:{marginBottom:6}},e("strong",null,"Scenario A — Expires Worthless: "),e("span",{style:{color:F.green,fontWeight:700}},`Keep +${fmtD(pt)}`)),
      e("div",{style:{marginBottom:4}},e("strong",null,`Scenario B — Assigned at $${strike.toFixed(2)}: `)),
      isCsp?[
        e("div",{key:"a"},`Buy ${q} shares at $${strike.toFixed(2)}: -${fmtD(strike*q)}`),
        ec&&e("div",{key:"b",style:{color:F.blueLink,fontWeight:700}},`Effective cost/share after premium: $${ec.toFixed(2)}`),
      ]:[
        e("div",{key:"a"},`Shares sold at $${strike.toFixed(2)}: +${fmtD(strike*q)}`),
        ap!==null&&e("div",{key:"b",style:{color:ap>=0?F.green:F.red,fontWeight:700}},`Net profit: ${ap>=0?"+":"-"}${fmtD(ap)}`),
        be!==null&&e("div",{key:"c",style:{color:F.gold}},`Break-even: $${be.toFixed(2)}/share`),
      ]
    )
  );
}

          e(SecLabel,{color:F.purple},"💰 Dividend Tracking"),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}},
            e(FField,{label:"Div/Share ($)",value:f.divAmount,onChange:v=>set("divAmount",v),placeholder:"0.25"}),

// ─── Analytics Tab ────────────────────────────────────────────────────────────
function AnalyticsTab({trades,stocks}) {
  const totOptPnl=trades.reduce((s,t)=>s+(calcPnl(t)||0),0);
  const totDiv=trades.reduce((s,t)=>s+calcDiv(t),0);
  const totStkPnl=stocks.reduce((s,st)=>s+(calcStkPnl(st)||0),0);
  const totAll=totOptPnl+totDiv+totStkPnl;
  const winners=trades.filter(t=>(calcPnl(t)||0)>0).length;
  const losers=trades.filter(t=>(calcPnl(t)||0)<0).length;
  const wr=trades.length>0?Math.round((winners/trades.length)*100):null;
  const byStrat={};
  trades.forEach(t=>{if(!byStrat[t.strategy])byStrat[t.strategy]={count:0,pnl:0,div:0};byStrat[t.strategy].count++;byStrat[t.strategy].pnl+=calcPnl(t)||0;byStrat[t.strategy].div+=calcDiv(t);});
  return e("div",null,
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:18}},

       {label:"Options P&L",value:(totOptPnl>=0?"+":"-")+fmtD(totOptPnl),color:totOptPnl>=0?F.green:F.red},

// ─── Student Dashboard ────────────────────────────────────────────────────────
function StudentDash({profile,onSignOut}) {
  const [trades,setTrades]=useState([]);
  const [stocks,setStocks]=useState([]);
  const [startBal,setStartBal]=useState(profile.starting_balance?.toString()||"25000");
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("positions");
  const [showTF,setShowTF]=useState(false);
  const [editT,setEditT]=useState(null);
  const [showSF,setShowSF]=useState(false);
  const [editS,setEditS]=useState(null);
  const [showReset,setShowReset]=useState(false);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{load();},[]);
  async function load(){
    setLoading(true);
    const[tr,st]=await Promise.all([
      sb.from("trades").select("*").eq("user_id",profile.id).order("created_at",{ascending:false}),
      sb.from("stocks").select("*").eq("user_id",profile.id).order("created_at",{ascending:false}),
    ]);
    setTrades((tr.data||[]).map(rtr));
    setStocks((st.data||[]).map(rts));
    setLoading(false);
  }
  const addT=async f=>{setSaving(true);const{data,err}=await sb.from("trades").insert(ttr(f,profile.id)).select().single();if(!err&&data){setTrades(p=>[rtr(data),...p]);setShowTF(false);}setSaving(false);};
  const saveT=async f=>{setSaving(true);await sb.from("trades").update(ttr(f,profile.id)).eq("id",f.id);setTrades(p=>p.map(r=>r.id===f.id?f:r));setEditT(null);setSaving(false);};
  const delT=async id=>{if(!window.confirm("Remove this trade?"))return;await sb.from("trades").delete().eq("id",id);setTrades(p=>p.filter(r=>r.id!==id));};
  const updMark=async(id,cv)=>{setTrades(p=>p.map(r=>r.id===id?{...r,currentValue:cv}:r));await sb.from("trades").update({current_value:pN(cv)||null,updated_at:new Date().toISOString()}).eq("id",id);};
  const addS=async f=>{setSaving(true);const{data,err}=await sb.from("stocks").insert(str(f,profile.id)).select().single();if(!err&&data){setStocks(p=>[rts(data),...p]);setShowSF(false);}setSaving(false);};
  const saveS=async f=>{setSaving(true);await sb.from("stocks").update(str(f,profile.id)).eq("id",f.id);setStocks(p=>p.map(r=>r.id===f.id?f:r));setEditS(null);setSaving(false);};
  const delS=async id=>{if(!window.confirm("Remove this position?"))return;await sb.from("stocks").delete().eq("id",id);setStocks(p=>p.filter(r=>r.id!==id));};
  const reset=async()=>{setSaving(true);await Promise.all([sb.from("trades").delete().eq("user_id",profile.id),sb.from("stocks").delete().eq("user_id",profile.id)]);setTrades([]);setStocks([]);setShowReset(false);setSaving(false);};
  const saveBal=async v=>{setStartBal(v);await sb.from("profiles").update({starting_balance:pN(v)||25000}).eq("id",profile.id);};

  if(loading)return e("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:F.bgPage}},e(Spinner,{size:40}));

  const tabs=[["positions","Positions"],["stocks","Stock Holdings"],["analytics","Summary & Analytics"]];
  return e("div",{style:{minHeight:"100vh",background:F.bgPage}},
    e(Banner,{trades,stocks,startBal,onSaveBal:saveBal}),
    // Top Nav
    e("div",{style:{background:F.bgHeader}},
      e("div",{style:{maxWidth:1400,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",height:46,gap:10}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8,marginRight:8}},
          e("div",{style:{width:26,height:26,borderRadius:"50%",background:F.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},"📈"),
          e("span",{style:{fontWeight:700,fontSize:14,color:"#fff",whiteSpace:"nowrap"}},"Options Learning Platform"),
          e("span",{style:{fontSize:10,background:"#2a4055",borderRadius:2,padding:"2px 6px",color:"#7a9ab5"}},"PAPER TRADING")
        ),
        e("span",{style:{fontSize:12,color:"#8aafc5"}},profile.full_name||profile.email),
        e("div",{style:{marginLeft:"auto",display:"flex",gap:8}},
          e("button",{onClick:()=>setShowReset(true),style:{background:"none",border:"1px solid #4a6a80",color:"#8aafc5",borderRadius:3,padding:"5px 10px",fontSize:12,cursor:"pointer"}},"↺ Reset"),
          e("button",{onClick:onSignOut,style:{background:"#1a2e3f",border:"1px solid #2a4a60",color:"#8aafc5",borderRadius:3,padding:"5px 12px",fontSize:12,cursor:"pointer"}},"Sign Out")
        )
      )
    ),
    // Sub Nav
    e("div",{style:{background:F.bgSubHeader,borderBottom:`2px solid ${F.green}`}},
      e("div",{style:{maxWidth:1400,margin:"0 auto",padding:"0 20px",display:"flex"}},
        tabs.map(([k,label])=>e("button",{key:k,onClick:()=>setTab(k),style:{background:"none",border:"none",color:tab===k?"#fff":"#8aafc5",fontSize:13,padding:"10px 18px",cursor:"pointer",borderBottom:tab===k?`3px solid ${F.green}`:"3px solid transparent",fontWeight:tab===k?700:400,marginBottom:-2}},label))
      )
    ),
    // Content
    e("div",{style:{maxWidth:1400,margin:"0 auto",padding:"16px 20px"}},
      tab==="positions"&&e(PositionsTab,{trades,onEdit:t=>setEditT(t),onDelete:delT,onAdd:()=>setShowTF(true),updMark}),
      tab==="stocks"&&e(StockTab,{stocks,trades,onAdd:()=>setShowSF(true),onEdit:s=>setEditS(s),onDelete:delS}),
      tab==="analytics"&&e(AnalyticsTab,{trades,stocks})
    ),
    // Modals
    (showTF||editT)&&e(TradeForm,{initial:editT||undefined,onSave:editT?saveT:addT,onCancel:()=>{setShowTF(false);setEditT(null);},saving}),
    (showSF||editS)&&e(StockForm,{initial:editS||undefined,trades,onSave:editS?saveS:addS,onCancel:()=>{setShowSF(false);setEditS(null);},saving}),
    showReset&&e(Modal,{title:"Reset Account",onClose:()=>setShowReset(false)},
      e("div",{style:{padding:20}},
        e("div",{style:{fontSize:13,color:F.textSecond,marginBottom:14}},`Delete all ${trades.length} trades and ${stocks.length} stock positions? Cannot be undone.`),
        e("div",{style:{display:"flex",gap:10,justifyContent:"flex-end"}},
          e("button",{onClick:()=>setShowReset(false),style:{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 20px",fontSize:13,cursor:"pointer"}},"Cancel"),
          e("button",{onClick:reset,disabled:saving,style:{background:F.red,color:"#fff",border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}},saving&&e(Spinner,{size:14}),"Yes, Reset")
        )
      )
    )
  );
}

// ─── Teacher Dashboard ────────────────────────────────────────────────────────
function TeacherDash({profile,onSignOut}) {
  const [classes,setClasses]=useState([]);
  const [loading,setLoading]=useState(true);
  const [activeClass,setActiveClass]=useState(null);
  const [students,setStudents]=useState([]);
  const [studLoading,setStudLoading]=useState(false);
  const [showCreate,setShowCreate]=useState(false);
  const [newName,setNewName]=useState("");
  const [newBal,setNewBal]=useState("25000");
  const [creating,setCreating]=useState(false);
  const [viewStudent,setViewStudent]=useState(null);
  const [confirmReset,setConfirmReset]=useState(null);
  const [resetting,setResetting]=useState(false);
  const [editCls,setEditCls]=useState(null);
  const [editName,setEditName]=useState("");
  const [editBal,setEditBal]=useState("");
  const [editSaving,setEditSaving]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const [confirmRegen,setConfirmRegen]=useState(false);
  const [newCode,setNewCode]=useState(null);

  useEffect(()=>{loadClasses();},[]);
  const loadClasses=async()=>{setLoading(true);const{data}=await sb.from("classes").select("*").eq("teacher_id",profile.id).order("created_at",{ascending:false});setClasses(data||[]);setLoading(false);};
  const loadStudents=async cls=>{
    setActiveClass(cls);setStudLoading(true);setNewCode(null);
    const{data:profs}=await sb.from("profiles").select("*").eq("class_id",cls.id);
    if(!profs?.length){setStudents([]);setStudLoading(false);return;}
    const ids=profs.map(p=>p.id);
    const[{data:trs},{data:stks}]=await Promise.all([sb.from("trades").select("*").in("user_id",ids),sb.from("stocks").select("*").in("user_id",ids)]);
    const result=profs.map(p=>{
      const t=(trs||[]).filter(x=>x.user_id===p.id).map(rtr);
      const s=(stks||[]).filter(x=>x.user_id===p.id).map(rts);
      const bal=pN(p.starting_balance||cls.starting_balance||25000);
      const{total}=calcTotal(t,s,bal.toString());
      const pnl=total-bal;
      const win=t.filter(x=>(calcPnl(x)||0)>0).length;
      return{profile:p,trades:t,stocks:s,total,pnl,startBal:bal.toString(),winRate:t.length>0?Math.round((win/t.length)*100):null,openCount:t.filter(x=>x.status==="Open").length,tradeCount:t.length};
    }).sort((a,b)=>b.total-a.total);
    setStudents(result);setStudLoading(false);
  };
  const createClass=async()=>{if(!newName.trim())return;setCreating(true);const code=genCode();const{error}=await sb.from("classes").insert({teacher_id:profile.id,name:newName.trim(),class_code:code,starting_balance:pN(newBal)||25000});if(!error){setShowCreate(false);setNewName("");setNewBal("25000");await loadClasses();}else alert(error.message);setCreating(false);};
  const saveEditCls=async()=>{setEditSaving(true);await sb.from("classes").update({name:editName.trim(),starting_balance:pN(editBal)||25000}).eq("id",editCls.id);const u={...editCls,name:editName.trim(),starting_balance:pN(editBal)||25000};setClasses(p=>p.map(c=>c.id===u.id?u:c));if(activeClass?.id===u.id)setActiveClass(u);setEditCls(null);setEditSaving(false);};
  const regenCode=async()=>{setEditSaving(true);const code=genCode();await sb.from("classes").update({class_code:code}).eq("id",editCls.id);setNewCode(code);setClasses(p=>p.map(c=>c.id===editCls.id?{...c,class_code:code}:c));if(activeClass?.id===editCls.id)setActiveClass(prev=>({...prev,class_code:code}));setConfirmRegen(false);setEditSaving(false);};
  const deleteCls=async()=>{setEditSaving(true);await sb.from("classes").delete().eq("id",editCls.id);setClasses(p=>p.filter(c=>c.id!==editCls.id));if(activeClass?.id===editCls.id){setActiveClass(null);setStudents([]);}setEditCls(null);setEditSaving(false);};
  const resetStudent=async s=>{setResetting(true);await Promise.all([sb.from("trades").delete().eq("user_id",s.profile.id),sb.from("stocks").delete().eq("user_id",s.profile.id)]);setConfirmReset(null);await loadStudents(activeClass);setResetting(false);};
  const resetAll=async()=>{setResetting(true);for(const s of students){await Promise.all([sb.from("trades").delete().eq("user_id",s.profile.id),sb.from("stocks").delete().eq("user_id",s.profile.id)]);}setConfirmReset(null);await loadStudents(activeClass);setResetting(false);};

  if(viewStudent)return e(ReadOnlyView,{student:viewStudent,onBack:()=>setViewStudent(null)});

  return e("div",{style:{minHeight:"100vh",background:F.bgPage}},
    e("div",{style:{background:F.bgBanner,borderBottom:`2px solid ${F.green}`}},
      e("div",{style:{maxWidth:1200,margin:"0 auto",padding:"0 20px",display:"flex",alignItems:"center",height:56,gap:12}},
        e("div",{style:{width:30,height:30,borderRadius:"50%",background:F.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"📈"),
        e("span",{style:{fontWeight:800,fontSize:16,color:"#fff"}},"Options Learning Platform"),
        e("span",{style:{fontSize:11,background:"#1a3a5c",borderRadius:3,padding:"2px 8px",color:"#7dd3a8"}},"TEACHER"),
        e("div",{style:{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}},
          e("span",{style:{fontSize:13,color:"#a8c4d8"}},profile.full_name||profile.email),
          e("button",{onClick:onSignOut,style:{background:"#1a2e3f",border:"1px solid #2a4a60",color:"#8aafc5",borderRadius:3,padding:"5px 12px",fontSize:12,cursor:"pointer"}},"Sign Out")
        )
      )
    ),
    e("div",{style:{maxWidth:1200,margin:"0 auto",padding:24}},
      e("div",{style:{display:"grid",gridTemplateColumns:"300px 1fr",gap:24}},
        // Left sidebar
        e("div",null,
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
            e("h2",{style:{fontSize:16,fontWeight:700}},"My Classes"),
            e("button",{onClick:()=>setShowCreate(true),style:{background:F.green,color:"#fff",border:"none",borderRadius:3,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}},"+ New Class")
          ),
          loading?e("div",{style:{textAlign:"center",padding:40}},e(Spinner,{size:24})):
          classes.length===0?e("div",{style:{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,padding:32,textAlign:"center",color:F.textMuted}},"No classes yet. Click + New Class."):
          e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
            classes.map(cls=>e("div",{key:cls.id,onClick:()=>loadStudents(cls),style:{background:activeClass?.id===cls.id?"#f0f7f0":F.bgPanel,border:`1px solid ${activeClass?.id===cls.id?F.green:F.borderLight}`,borderRadius:4,padding:"12px 14px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}},
              e("div",{style:{fontWeight:700,fontSize:14,marginBottom:6}},cls.name),
              e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
                e("span",{style:{fontFamily:"monospace",fontSize:18,fontWeight:800,color:F.green,letterSpacing:3}},cls.class_code),
                e("button",{onClick:ev=>{ev.stopPropagation();navigator.clipboard?.writeText(cls.class_code);},style:{background:"none",border:`1px solid ${F.green}`,color:F.green,borderRadius:3,padding:"2px 7px",fontSize:10,cursor:"pointer"}},"Copy")
              ),
              e("div",{style:{fontSize:11,color:F.textMuted,marginBottom:8}},"Starting: $"+pN(cls.starting_balance).toLocaleString()),

            ))

                    e("div",{style:{display:"flex",gap:6,justifyContent:"center"}},

                      e("button",{onClick:()=>setConfirmReset(s),style:{background:"none",border:`1px solid ${F.red}`,color:F.red,borderRadius:3,padding:"3px 8px",fontSize:11,cursor:"pointer"}},"Reset")
                    )
                  )
                )))
              )
            )
          )
        )
      )
    ),
    // Create class modal
    showCreate&&e(Modal,{title:"Create New Class",onClose:()=>setShowCreate(false),width:400},
      e("div",{style:{padding:20}},
        e("div",{style:{marginBottom:12}},e(FField,{label:"Class Name",value:newName,onChange:setNewName,placeholder:"e.g. Period 3 — Finance",autoFocus:true})),
        e("div",{style:{marginBottom:20}},e(FField,{label:"Starting Balance ($)",value:newBal,onChange:setNewBal,placeholder:"25000"})),
        e("div",{style:{display:"flex",gap:10}},
          e("button",{onClick:createClass,disabled:creating,style:{background:F.green,color:"#fff",border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}},creating&&e(Spinner,{size:14}),"Create Class"),
          e("button",{onClick:()=>setShowCreate(false),style:{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 16px",fontSize:13,cursor:"pointer"}},"Cancel")
        )
      )
    ),
    // Edit class modal
    editCls&&e(Modal,{title:"Class Settings — "+editCls.name,onClose:()=>setEditCls(null),width:480},
      e("div",{style:{padding:20}},
        newCode&&e("div",{style:{background:F.greenLight,border:`1px solid ${F.greenBorder}`,borderRadius:3,padding:"10px 14px",marginBottom:14,fontSize:13}},"✓ New code: ",e("strong",{style:{color:F.green,letterSpacing:2,fontSize:16}},newCode)),
        e("div",{style:{marginBottom:12}},e(FField,{label:"Class Name",value:editName,onChange:setEditName})),
        e("div",{style:{marginBottom:16}},e(FField,{label:"Starting Balance ($)",value:editBal,onChange:setEditBal})),
        e("div",{style:{display:"flex",gap:10,marginBottom:20}},
          e("button",{onClick:saveEditCls,disabled:editSaving,style:{background:F.green,color:"#fff",border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}},editSaving&&e(Spinner,{size:14}),"Save"),
          e("button",{onClick:()=>setEditCls(null),style:{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 16px",fontSize:13,cursor:"pointer"}},"Cancel")
        ),
        e("div",{style:{borderTop:`1px solid ${F.borderLight}`,paddingTop:14,display:"flex",gap:10,flexWrap:"wrap"}},
          !confirmRegen?e("button",{onClick:()=>setConfirmRegen(true),style:{background:"none",border:`1px solid ${F.gold}`,color:F.gold,borderRadius:3,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}},"🔄 New Class Code"):
          e("div",{style:{background:F.goldLight,border:"1px solid #ffe08a",borderRadius:3,padding:"8px 12px",fontSize:12,display:"flex",gap:8,alignItems:"center"}},
            e("span",null,"Old code stops working. Continue?"),
            e("button",{onClick:regenCode,disabled:editSaving,style:{background:F.gold,color:"#fff",border:"none",borderRadius:3,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:700}},"Yes"),
            e("button",{onClick:()=>setConfirmRegen(false),style:{background:"none",border:"none",cursor:"pointer",color:F.textSecond,fontSize:12}},"Cancel")
          ),
          !confirmDel?e("button",{onClick:()=>setConfirmDel(true),style:{background:"none",border:`1px solid ${F.red}`,color:F.red,borderRadius:3,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}},"🗑 Delete Class"):
          e("div",{style:{background:F.redLight,border:"1px solid #ffb3b3",borderRadius:3,padding:"8px 12px",fontSize:12,display:"flex",gap:8,alignItems:"center"}},
            e("span",null,"Delete ",e("strong",null,editCls.name),"? Cannot be undone."),
            e("button",{onClick:deleteCls,disabled:editSaving,style:{background:F.red,color:"#fff",border:"none",borderRadius:3,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:700}},"Delete"),
            e("button",{onClick:()=>setConfirmDel(false),style:{background:"none",border:"none",cursor:"pointer",color:F.textSecond,fontSize:12}},"Cancel")
          )
        )
      )
    ),
    // Confirm reset modal
    confirmReset&&e(Modal,{title:"Confirm Reset",onClose:()=>setConfirmReset(null),headerBg:"#6b1a1a"},
      e("div",{style:{padding:20}},
        e("div",{style:{fontSize:13,color:F.textSecond,marginBottom:14}},
          confirmReset==="all"?`Reset ALL ${students.length} students in "${activeClass.name}"? All trades and stocks will be deleted.`:`Reset ${confirmReset.profile.full_name||confirmReset.profile.email}? All their trades and stocks will be deleted.`
        ),
        e("div",{style:{display:"flex",gap:10,justifyContent:"flex-end"}},
          e("button",{onClick:()=>setConfirmReset(null),style:{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 16px",fontSize:13,cursor:"pointer"}},"Cancel"),
          e("button",{onClick:()=>confirmReset==="all"?resetAll():resetStudent(confirmReset),disabled:resetting,style:{background:F.red,color:"#fff",border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}},resetting&&e(Spinner,{size:14}),"Yes, Reset")
        )
      )
    )
  );
}

// ─── Auth Screen ──────────────────────────────────────────────────────────────
function AuthScreen({onAuth}) {
  const [mode,setMode]=useState("login");
  const [role,setRole]=useState("student");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [name,setName]=useState("");
  const [classCode,setClassCode]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [success,setSuccess]=useState(null);
  const [forgotMode,setForgotMode]=useState(false);
  const [forgotEmail,setForgotEmail]=useState("");
  const [forgotSent,setForgotSent]=useState(false);

  const authInp={...inp,background:"#1a2e3f",border:"1px solid #2a4a60",color:"#fff",padding:"9px 12px",fontSize:14};

  const login=async ev=>{
    ev.preventDefault();setLoading(true);setError(null);
    const{data,error:err}=await sb.auth.signInWithPassword({email,password});
    if(err){setError(err.message);setLoading(false);return;}
    const{data:prof}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
    onAuth(prof);setLoading(false);
  };
  const signup=async ev=>{
    ev.preventDefault();setLoading(true);setError(null);
    let classId=null,startingBal=25000;
    if(role==="student"){
      if(!classCode.trim()){setError("Enter the class code from your teacher.");setLoading(false);return;}
      const{data:cls}=await sb.from("classes").select("*").eq("class_code",classCode.trim().toUpperCase()).single();
      if(!cls){setError("Invalid class code. Check with your teacher.");setLoading(false);return;}
      classId=cls.id;startingBal=cls.starting_balance||25000;
    }
    const{data,error:err}=await sb.auth.signUp({email,password,options:{data:{full_name:name}}});
    if(err){setError(err.message);setLoading(false);return;}
    if(data.user){
      await sb.from("profiles").update({full_name:name.trim()||null,role,class_id:classId,starting_balance:startingBal}).eq("id",data.user.id);
      const{data:prof}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
      if(prof){onAuth(prof);setLoading(false);return;}
    }
    setSuccess("Account created! Check your email to confirm, then sign in.");
    setLoading(false);
  };
  const sendForgot=async ev=>{ev.preventDefault();setLoading(true);await sb.auth.resetPasswordForEmail(forgotEmail);setForgotSent(true);setLoading(false);};

  return e("div",{style:{minHeight:"100vh",background:F.bgBanner,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    e("div",{style:{width:"100%",maxWidth:420}},
      e("div",{style:{textAlign:"center",marginBottom:32}},
        e("div",{style:{width:56,height:56,borderRadius:"50%",background:F.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}},"📈"),
        e("h1",{style:{color:"#fff",fontSize:24,fontWeight:800,marginBottom:4}},"Options Learning Platform"),
        e("p",{style:{color:"#5a7a95",fontSize:14}},"Paper trading for the classroom")
      ),
      e("div",{style:{background:"#131f2a",border:"1px solid #1e3247",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}},
        forgotMode?e("div",{style:{padding:24}},
          !forgotSent?e("div",null,
            e("div",{style:{fontWeight:700,color:"#fff",marginBottom:12,fontSize:15}},"Reset Password"),
            e("form",{onSubmit:sendForgot},
              e("div",{style:{marginBottom:16}},e(FLabel,null,"Email"),e("input",{type:"email",value:forgotEmail,onChange:ev=>setForgotEmail(ev.target.value),placeholder:"you@example.com",style:authInp})),
              e("button",{type:"submit",disabled:loading,style:{width:"100%",background:F.green,color:"#fff",border:"none",borderRadius:4,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},loading&&e(Spinner,{size:14}),"Send Reset Email")
            )
          ):e("div",{style:{textAlign:"center",padding:"16px 0"}},
            e("div",{style:{fontSize:32,marginBottom:12}},"📧"),
            e("div",{style:{color:"#86efac",fontWeight:700,marginBottom:8}},"Email sent!"),
            e("div",{style:{color:"#5a7a95",fontSize:13}},"Check your inbox for the reset link.")
          ),
          e("button",{onClick:()=>{setForgotMode(false);setForgotSent(false);},style:{marginTop:16,background:"none",border:"none",color:"#5a7a95",fontSize:13,cursor:"pointer",width:"100%",textAlign:"center"}},"← Back to Sign In")
        ):e("div",null,
          e("div",{style:{display:"flex",borderBottom:"1px solid #1e3247"}},
            [["login","Sign In"],["signup","Sign Up"]].map(([m,label])=>e("button",{key:m,onClick:()=>{setMode(m);setError(null);setSuccess(null);},style:{flex:1,background:mode===m?"#1a2e3f":"transparent",border:"none",color:mode===m?"#fff":"#5a7a95",padding:"14px 0",fontSize:14,cursor:"pointer",fontWeight:mode===m?700:400,borderBottom:mode===m?`2px solid ${F.green}`:"2px solid transparent"}},label))
          ),
          e("div",{style:{padding:24}},
            error&&e("div",{style:{background:"#2a1a1a",border:"1px solid #cc3333",borderRadius:4,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#ff9999"}},error),
            success&&e("div",{style:{background:"#1a2a1a",border:`1px solid ${F.green}`,borderRadius:4,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#86efac"}},success),
            mode==="login"?e("form",{onSubmit:login},
              e("div",{style:{marginBottom:14}},e(FLabel,null,"Email"),e("input",{type:"email",value:email,onChange:ev=>setEmail(ev.target.value),placeholder:"you@example.com",style:authInp})),
              e("div",{style:{marginBottom:8}},e(FLabel,null,"Password"),e("input",{type:"password",value:password,onChange:ev=>setPassword(ev.target.value),placeholder:"••••••••",style:authInp})),
              e("div",{style:{textAlign:"right",marginBottom:20}},e("button",{type:"button",onClick:()=>{setForgotMode(true);setForgotEmail(email);},style:{background:"none",border:"none",color:"#5a7a95",fontSize:12,cursor:"pointer"}},"Forgot password?")),
              e("button",{type:"submit",disabled:loading,style:{width:"100%",background:F.green,color:"#fff",border:"none",borderRadius:4,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},loading&&e(Spinner,{size:14}),"Sign In")
            ):e("form",{onSubmit:signup},
              e("div",{style:{marginBottom:16}},
                e(FLabel,null,"I am a"),
                e("div",{style:{display:"flex",border:"1px solid #2a4a60",borderRadius:4,overflow:"hidden"}},
                  [["student","🎓 Student"],["teacher","👨‍🏫 Teacher"]].map(([r,label])=>e("button",{key:r,type:"button",onClick:()=>setRole(r),style:{flex:1,background:role===r?F.bgSubHeader:"transparent",border:"none",color:role===r?"#fff":"#5a7a95",padding:"10px 0",fontSize:13,cursor:"pointer",fontWeight:role===r?700:400}},label))
                )
              ),
              e("div",{style:{marginBottom:12}},e(FLabel,null,"Full Name"),e("input",{value:name,onChange:ev=>setName(ev.target.value),placeholder:"Your name",style:authInp})),
              e("div",{style:{marginBottom:12}},e(FLabel,null,"Email"),e("input",{type:"email",value:email,onChange:ev=>setEmail(ev.target.value),placeholder:"you@example.com",style:authInp})),
              e("div",{style:{marginBottom:12}},e(FLabel,null,"Password"),e("input",{type:"password",value:password,onChange:ev=>setPassword(ev.target.value),placeholder:"At least 6 characters",style:authInp})),
              role==="student"&&e("div",{style:{marginBottom:12}},
                e(FLabel,null,"Class Code"),
                e("input",{value:classCode,onChange:ev=>setClassCode(ev.target.value.toUpperCase()),placeholder:"e.g. FIN3A7",style:{...authInp,fontFamily:"monospace",letterSpacing:2,fontSize:15,fontWeight:700}}),
                e("div",{style:{fontSize:11,color:"#5a7a95",marginTop:4}},"Get this from your teacher.")
              ),
              e("div",{style:{height:8}}),
              e("button",{type:"submit",disabled:loading,style:{width:"100%",background:F.green,color:"#fff",border:"none",borderRadius:4,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},loading&&e(Spinner,{size:14}),"Create Account")
            )
          )
        )
      ),
      e("p",{style:{textAlign:"center",color:"#3a5a70",fontSize:12,marginTop:20}},"Paper Trading Only — Educational purposes only.")
    )
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function App() {
  const [profile,setProfile]=useState(null);
  const [checking,setChecking]=useState(true);
  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){const{data:p}=await sb.from("profiles").select("*").eq("id",session.user.id).single();setProfile(p||null);}
      setChecking(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(!session){setProfile(null);return;}
      if(event==="SIGNED_IN"){const{data:p}=await sb.from("profiles").select("*").eq("id",session.user.id).single();setProfile(p||null);}
    });
    return()=>subscription.unsubscribe();
  },[]);
  const signOut=async()=>{await sb.auth.signOut();setProfile(null);};
  if(checking)return e("div",{style:{minHeight:"100vh",background:F.bgBanner,display:"flex",alignItems:"center",justifyContent:"center"}},e(Spinner,{size:40}));
  if(!profile)return e(AuthScreen,{onAuth:setProfile});
  if(profile.role==="teacher"||profile.role==="admin")return e(TeacherDash,{profile,onSignOut:signOut});
  return e(StudentDash,{profile,onSignOut:signOut});
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
