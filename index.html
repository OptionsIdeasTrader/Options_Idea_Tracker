// ─── Class Settings Modal ─────────────────────────────────────────────────────
function ClassSettingsModal({cls,onClose,onSaved,onDeleted}){
  const [name,setName]=useState(cls.name);
  const [bal,setBal]=useState(cls.starting_balance?.toString()||"25000");
  const [saving,setSaving]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const [confirmRegenCode,setConfirmRegenCode]=useState(false);
  const [newCode,setNewCode]=useState(null);

  const save=async()=>{
    setSaving(true);
    await sb.from("classes").update({name:name.trim(),starting_balance:parseN(bal)||25000}).eq("id",cls.id);
    onSaved({...cls,name:name.trim(),starting_balance:parseN(bal)||25000});
    setSaving(false);
    onClose();
  };
  const regenCode=async()=>{
    setSaving(true);
    const code=genCode();
    await sb.from("classes").update({class_code:code}).eq("id",cls.id);
    setNewCode(code);
    setConfirmRegenCode(false);
    setSaving(false);
  };
  const deleteClass=async()=>{
    setSaving(true);
    await sb.from("classes").delete().eq("id",cls.id);
    onDeleted(cls.id);
    setSaving(false);
  };

  return(
    <Modal title={`Class Settings — ${cls.name}`} onClose={onClose} width={480}>
      <div style={{padding:20}}>
        {newCode&&<div style={{background:F.greenLight,border:`1px solid ${F.greenBorder}`,borderRadius:3,padding:"10px 14px",marginBottom:16,fontSize:13}}>✓ New class code: <strong style={{color:F.green,letterSpacing:2,fontSize:16}}>{newCode}</strong> — share this with students.</div>}
        <div style={{marginBottom:12}}><FField label="Class Name" value={name} onChange={setName}/></div>
        <div style={{marginBottom:16}}><FField label="Starting Balance ($)" value={bal} onChange={setBal}/><div style={{fontSize:11,color:F.textMuted,marginTop:4}}>Note: changing this only affects calculations going forward. Students' existing trades are not changed.</div></div>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          <button onClick={save} disabled={saving} style={{background:F.green,color:"#fff",border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>{saving&&<Spinner size={14}/>}Save Changes</button>
          <button onClick={onClose} style={{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>Cancel</button>
        </div>
        <div style={{borderTop:`1px solid ${F.borderLight}`,paddingTop:16}}>
          <SecLabel>Danger Zone</SecLabel>
          <div style={{display:"flex",gap:10}}>
            {!confirmRegenCode?(
              <button onClick={()=>setConfirmRegenCode(true)} style={{background:"none",border:`1px solid ${F.gold}`,color:F.gold,borderRadius:3,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>🔄 Regenerate Class Code</button>
            ):(
              <div style={{background:F.goldLight,border:`1px solid #ffe08a`,borderRadius:3,padding:"8px 12px",fontSize:12,display:"flex",gap:8,alignItems:"center"}}>
                <span>Old code stops working immediately. Continue?</span>
                <button onClick={regenCode} disabled={saving} style={{background:F.gold,color:"#fff",border:"none",borderRadius:3,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:700}}>Yes</button>
                <button onClick={()=>setConfirmRegenCode(false)} style={{background:"none",border:"none",cursor:"pointer",color:F.textSecond,fontSize:12}}>Cancel</button>
              </div>
            )}
            {!confirmDel?(
              <button onClick={()=>setConfirmDel(true)} style={{background:"none",border:`1px solid ${F.red}`,color:F.red,borderRadius:3,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>🗑 Delete Class</button>
            ):(
              <div style={{background:F.redLight,border:"1px solid #ffb3b3",borderRadius:3,padding:"8px 12px",fontSize:12,display:"flex",gap:8,alignItems:"center"}}>
                <span>Delete <strong>{cls.name}</strong>? Cannot be undone.</span>
                <button onClick={deleteClass} disabled={saving} style={{background:F.red,color:"#fff",border:"none",borderRadius:3,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:700}}>Delete</button>
                <button onClick={()=>setConfirmDel(false)} style={{background:"none",border:"none",cursor:"pointer",color:F.textSecond,fontSize:12}}>Cancel</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </Modal>
  );
}

// ─── Teacher Dashboard ────────────────────────────────────────────────────────
function TeacherDashboard({profile,onSignOut}){
  const [classes,setClasses]=useState([]);
  const [loading,setLoading]=useState(true);
  const [activeClass,setActiveClass]=useState(null);
  const [students,setStudents]=useState([]);
  const [studLoading,setStudLoading]=useState(false);
  const [showCreate,setShowCreate]=useState(false);
  const [newName,setNewName]=useState("");
  const [newBal,setNewBal]=useState("25000");
  const [creating,setCreating]=useState(false);
  const [viewStudent,setViewStudent]=useState(null);
  const [confirmReset,setConfirmReset]=useState(null);  // student obj | "all"
  const [resetting,setResetting]=useState(false);
  const [showClassSettings,setShowClassSettings]=useState(null);

  useEffect(()=>{loadClasses();},[]);

  const loadClasses=async()=>{
    setLoading(true);
    const{data}=await sb.from("classes").select("*").eq("teacher_id",profile.id).order("created_at",{ascending:false});
    setClasses(data||[]);
    setLoading(false);
  };

  const loadStudents=async cls=>{
    setActiveClass(cls);setStudLoading(true);
    const{data:profs}=await sb.from("profiles").select("*").eq("class_id",cls.id);
    if(!profs?.length){setStudents([]);setStudLoading(false);return;}
    const ids=profs.map(p=>p.id);
    const[{data:trs},{data:stks}]=await Promise.all([
      sb.from("trades").select("*").in("user_id",ids),
      sb.from("stocks").select("*").in("user_id",ids),
    ]);
    const result=profs.map(p=>{
      const t=(trs||[]).filter(x=>x.user_id===p.id).map(rowToTrade);
      const s=(stks||[]).filter(x=>x.user_id===p.id).map(rowToStock);
      const bal=parseN(p.starting_balance||cls.starting_balance||25000);
      const{total}=calcTotalValue(t,s,bal);
      const pnl=total-bal;
      const winners=t.filter(x=>(calcOptionPnl(x)||0)>0).length;
      return{profile:p,trades:t,stocks:s,total,pnl,startBal:bal.toString(),
        winRate:t.length>0?Math.round((winners/t.length)*100):null,
        openCount:t.filter(x=>x.status==="Open").length,tradeCount:t.length};
    }).sort((a,b)=>b.total-a.total);
    setStudents(result);setStudLoading(false);
  };

  const createClass=async()=>{
    if(!newName.trim())return;
    setCreating(true);
    const code=genCode();
    const{error}=await sb.from("classes").insert({teacher_id:profile.id,name:newName.trim(),class_code:code,starting_balance:parseN(newBal)||25000});
    if(!error){setShowCreate(false);setNewName("");setNewBal("25000");await loadClasses();}
    else alert("Error: "+error.message);
    setCreating(false);
  };

  const resetStudent=async s=>{
    setResetting(true);
    await Promise.all([sb.from("trades").delete().eq("user_id",s.profile.id),sb.from("stocks").delete().eq("user_id",s.profile.id)]);
    setConfirmReset(null);await loadStudents(activeClass);setResetting(false);
  };
  const resetAll=async()=>{
    setResetting(true);
    for(const s of students){await Promise.all([sb.from("trades").delete().eq("user_id",s.profile.id),sb.from("stocks").delete().eq("user_id",s.profile.id)]);}
    setConfirmReset(null);await loadStudents(activeClass);setResetting(false);
  };

  const copyCode=code=>{
    navigator.clipboard?.writeText(code).catch(()=>{});
  };

  if(viewStudent) return <StudentReadOnlyView student={viewStudent} onBack={()=>setViewStudent(null)}/>;

  return(
    <div style={{minHeight:"100vh",background:F.bgPage}}>
      {/* Header */}
      <div style={{background:F.bgBanner,borderBottom:`2px solid ${F.green}`}}>
        <div style={{maxWidth:1200,margin:"0 auto",padding:"0 20px",display:"flex",alignItems:"center",height:56,gap:12}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:F.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📈</div>
          <span style={{fontWeight:800,fontSize:16,color:"#fff"}}>Options Learning Platform</span>
          <span style={{fontSize:11,background:"#1a3a5c",borderRadius:3,padding:"2px 8px",color:"#7dd3a8"}}>TEACHER</span>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:13,color:"#a8c4d8"}}>{profile.full_name||profile.email}</span>
            <button onClick={onSignOut} style={{background:"#1a2e3f",border:"1px solid #2a4a60",color:"#8aafc5",borderRadius:3,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Sign Out</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1200,margin:"0 auto",padding:24}}>
        <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:24}}>

          {/* Left: classes */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h2 style={{fontSize:16,fontWeight:700}}>My Classes</h2>
              <button onClick={()=>setShowCreate(true)} style={{background:F.green,color:"#fff",border:"none",borderRadius:3,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ New Class</button>
            </div>
            {loading?<div style={{textAlign:"center",padding:40}}><Spinner size={24}/></div>:classes.length===0?(
              <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,padding:32,textAlign:"center",color:F.textMuted}}>
                <div style={{fontWeight:600,marginBottom:6}}>No classes yet.</div>
                <div style={{fontSize:12}}>Click + New Class to get started.</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {classes.map(cls=>(
                  <div key={cls.id} onClick={()=>loadStudents(cls)} style={{background:activeClass?.id===cls.id?"#f0f7f0":F.bgPanel,border:`1px solid ${activeClass?.id===cls.id?F.green:F.borderLight}`,borderRadius:4,padding:"12px 14px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>{cls.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:F.green,letterSpacing:3}}>{cls.class_code}</span>
                      <button onClick={e=>{e.stopPropagation();copyCode(cls.class_code);}} style={{background:"none",border:`1px solid ${F.green}`,color:F.green,borderRadius:3,padding:"2px 7px",fontSize:10,cursor:"pointer"}}>Copy</button>
                    </div>
                    <div style={{fontSize:11,color:F.textMuted}}>Starting: ${parseN(cls.starting_balance).toLocaleString()}</div>
                    <div style={{marginTop:8}}>
                      <button onClick={e=>{e.stopPropagation();setShowClassSettings(cls);}} style={{background:F.blueLinkLight,border:`1px solid ${F.blueLink}`,color:F.blueLink,borderRadius:3,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>⚙ Settings</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Right: leaderboard */}
          <div>
            {!activeClass?(
              <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,padding:60,textAlign:"center",color:F.textMuted}}>
                <div style={{fontSize:32,marginBottom:12}}>📊</div>
                <div style={{fontWeight:600,fontSize:16,marginBottom:6}}>Select a class</div>
                <div style={{fontSize:13}}>Click a class on the left to see the leaderboard.</div>
              </div>
            ):(
              <>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <h2 style={{fontSize:16,fontWeight:700}}>{activeClass.name} — Leaderboard</h2>
                  <button onClick={()=>setConfirmReset("all")} style={{background:"none",border:`1px solid ${F.gold}`,color:F.gold,borderRadius:3,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}>↺ Reset All Students</button>
                </div>
                {studLoading?<div style={{textAlign:"center",padding:60}}><Spinner size={28}/></div>:students.length===0?(
                  <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,padding:40,textAlign:"center",color:F.textMuted}}>
                    <div style={{fontWeight:600,marginBottom:8}}>No students yet.</div>
                    <div style={{fontSize:13}}>Share the class code <strong style={{color:F.green,fontFamily:"monospace",letterSpacing:3,fontSize:16}}>{activeClass.class_code}</strong> with your students.</div>
                  </div>
                ):(
                  <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr>{["Rank","Student","Account Value","P&L vs Start","Win Rate","Trades","Open","Actions"].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
                      <tbody>
                        {students.map((s,i)=>(
                          <tr key={s.profile.id} style={{background:i===0?"#f0fff4":i%2===0?F.bgPanel:F.rowAlt,borderBottom:`1px solid ${F.borderLight}`}}>
                            <td style={{...tdS,textAlign:"center",fontWeight:700,fontSize:16,color:i===0?F.green:F.textMuted}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td>
                            <td style={tdS}><div style={{fontWeight:600}}>{s.profile.full_name||s.profile.email}</div><div style={{fontSize:10,color:F.textMuted}}>{s.profile.email}</div></td>
                            <td style={{...tdS,fontWeight:700,fontSize:14}}>{fmtD(s.total)}</td>
                            <td style={{...tdS,fontWeight:700,color:s.pnl>=0?F.green:F.red}}>{s.pnl>=0?"+":"-"}{fmtD(s.pnl)}</td>
                            <td style={{...tdS,color:s.winRate===null?F.textMuted:s.winRate>50?F.green:F.red,fontWeight:s.winRate!==null?700:400}}>{s.winRate!==null?`${s.winRate}%`:"—"}</td>
                            <td style={tdS}>{s.tradeCount}</td>
                            <td style={tdS}>{s.openCount}</td>
                            <td style={{...tdS,textAlign:"center"}}>
                              <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                                <button onClick={()=>setViewStudent(s)} style={{background:F.blueLinkLight,border:`1px solid ${F.blueLink}`,color:F.blueLink,borderRadius:3,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>View</button>
                                <button onClick={()=>setConfirmReset(s)} style={{background:"none",border:`1px solid ${F.red}`,color:F.red,borderRadius:3,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>Reset</button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      </div>

      {/* Create class modal */}
      {showCreate&&<Modal title="Create New Class" onClose={()=>setShowCreate(false)} width={400}>
        <div style={{padding:20}}>
          <div style={{marginBottom:12}}><FField label="Class Name" value={newName} onChange={setNewName} placeholder="e.g. Period 3 — Finance" autoFocus/></div>
          <div style={{marginBottom:20}}><FField label="Starting Balance ($)" value={newBal} onChange={setNewBal} placeholder="25000"/></div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={createClass} disabled={creating} style={{background:F.green,color:"#fff",border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>{creating&&<Spinner size={14}/>}Create Class</button>
            <button onClick={()=>setShowCreate(false)} style={{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      </Modal>}

      {/* Class settings modal */}
      {showClassSettings&&<ClassSettingsModal cls={showClassSettings}
        onClose={()=>setShowClassSettings(null)}
        onSaved={updated=>{setClasses(p=>p.map(c=>c.id===updated.id?updated:c));if(activeClass?.id===updated.id)setActiveClass(updated);}}
        onDeleted={id=>{setClasses(p=>p.filter(c=>c.id!==id));if(activeClass?.id===id){setActiveClass(null);setStudents([]);}setShowClassSettings(null);}}
      />}

      {/* Confirm reset modal */}
      {confirmReset&&<Modal title="Confirm Reset" onClose={()=>setConfirmReset(null)} headerBg="#6b1a1a">
        <div style={{padding:20}}>
          <div style={{fontSize:13,color:F.textSecond,lineHeight:1.6,marginBottom:14}}>
            {confirmReset==="all"
              ?`This will delete ALL trades and stocks for all ${students.length} students in "${activeClass.name}" and reset their balances. Cannot be undone.`
              :`This will delete all trades and stocks for ${confirmReset.profile.full_name||confirmReset.profile.email} and reset their balance to ${fmtD(confirmReset.startBal)}. Cannot be undone.`}
          </div>
          <div style={{background:F.redLight,border:"1px solid #ffb3b3",borderRadius:3,padding:"8px 12px",fontSize:12,color:F.red,marginBottom:16}}>⚠️ This action is permanent.</div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button onClick={()=>setConfirmReset(null)} style={{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>confirmReset==="all"?resetAll():resetStudent(confirmReset)} disabled={resetting} style={{background:F.red,color:"#fff",border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>{resetting&&<Spinner size={14}/>}Yes, Reset</button>
          </div>
        </div>
      </Modal>}
    </div>
  );
}

// ─── Auth Screen ──────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login");
  const [role,setRole]=useState("student");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [name,setName]=useState("");
  const [classCode,setClassCode]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [success,setSuccess]=useState(null);
  const [forgotMode,setForgotMode]=useState(false);
  const [forgotEmail,setForgotEmail]=useState("");
  const [forgotSent,setForgotSent]=useState(false);

  const login=async e=>{
    e.preventDefault();setLoading(true);setError(null);
    const{data,error:err}=await sb.auth.signInWithPassword({email,password});
    if(err){setError(err.message);setLoading(false);return;}
    const{data:prof}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
    onAuth(prof);setLoading(false);
  };

  const signup=async e=>{
    e.preventDefault();setLoading(true);setError(null);
    let classId=null;
    if(role==="student"){
      if(!classCode.trim()){setError("Enter the class code from your teacher.");setLoading(false);return;}
      const{data:cls}=await sb.from("classes").select("*").eq("class_code",classCode.trim().toUpperCase()).single();
      if(!cls){setError("Invalid class code. Check with your teacher.");setLoading(false);return;}
      classId=cls.id;
    }
    const{data,error:err}=await sb.auth.signUp({email,password,options:{data:{full_name:name}}});
    if(err){setError(err.message);setLoading(false);return;}
    // If user already exists and confirms immediately (no email verify needed in some setups)
    if(data.user){
      let startingBal=25000;
      if(classId){const{data:cls}=await sb.from("classes").select("starting_balance").eq("id",classId).single();if(cls?.starting_balance)startingBal=cls.starting_balance;}
      await sb.from("profiles").update({full_name:name.trim()||null,role,class_id:classId,starting_balance:startingBal}).eq("id",data.user.id);
      const{data:prof}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
      if(prof){onAuth(prof);setLoading(false);return;}
    }
    setSuccess("Account created! Check your email to confirm, then sign in.");
    setLoading(false);
  };

  const sendForgotPassword=async e=>{
    e.preventDefault();setLoading(true);
    await sb.auth.resetPasswordForEmail(forgotEmail);
    setForgotSent(true);setLoading(false);
  };

  const authInpStyle={...inp,background:"#1a2e3f",border:"1px solid #2a4a60",color:"#fff",padding:"9px 12px",fontSize:14};

  return(
    <div style={{minHeight:"100vh",background:F.bgBanner,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,borderRadius:"50%",background:F.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>📈</div>
          <h1 style={{color:"#fff",fontSize:24,fontWeight:800,marginBottom:4}}>Options Learning Platform</h1>
          <p style={{color:"#5a7a95",fontSize:14}}>Paper trading for the classroom</p>
        </div>

        <div style={{background:"#131f2a",border:"1px solid #1e3247",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>

          {forgotMode?(
            <div style={{padding:24}}>
              {!forgotSent?(
                <>
                  <div style={{fontWeight:700,color:"#fff",marginBottom:4,fontSize:15}}>Reset Password</div>
                  <div style={{color:"#5a7a95",fontSize:13,marginBottom:16}}>Enter your email and we'll send a reset link.</div>
                  <form onSubmit={sendForgotPassword}>
                    <div style={{marginBottom:16}}><FLabel>Email</FLabel><input type="email" value={forgotEmail} onChange={e=>setForgotEmail(e.target.value)} placeholder="you@example.com" style={authInpStyle}/></div>
                    <button type="submit" disabled={loading} style={{width:"100%",background:F.green,color:"#fff",border:"none",borderRadius:4,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{loading&&<Spinner size={14}/>}Send Reset Email</button>
                  </form>
                </>
              ):(
                <div style={{textAlign:"center",padding:"16px 0"}}>
                  <div style={{fontSize:32,marginBottom:12}}>📧</div>
                  <div style={{color:"#86efac",fontWeight:700,marginBottom:8}}>Email sent!</div>
                  <div style={{color:"#5a7a95",fontSize:13}}>Check your inbox for the reset link.</div>
                </div>
              )}
              <button onClick={()=>{setForgotMode(false);setForgotSent(false);}} style={{marginTop:16,background:"none",border:"none",color:"#5a7a95",fontSize:13,cursor:"pointer",width:"100%",textAlign:"center"}}>← Back to Sign In</button>
            </div>
          ):(
            <>
              <div style={{display:"flex",borderBottom:"1px solid #1e3247"}}>
                {[["login","Sign In"],["signup","Sign Up"]].map(([m,label])=>(
                  <button key={m} onClick={()=>{setMode(m);setError(null);setSuccess(null);}} style={{flex:1,background:mode===m?"#1a2e3f":"transparent",border:"none",color:mode===m?"#fff":"#5a7a95",padding:"14px 0",fontSize:14,cursor:"pointer",fontWeight:mode===m?700:400,borderBottom:mode===m?`2px solid ${F.green}`:"2px solid transparent"}}>
                    {label}
                  </button>
                ))}
              </div>
              <div style={{padding:24}}>
                {error&&<div style={{background:"#2a1a1a",border:"1px solid #cc3333",borderRadius:4,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#ff9999"}}>{error}</div>}
                {success&&<div style={{background:"#1a2a1a",border:`1px solid ${F.green}`,borderRadius:4,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#86efac"}}>{success}</div>}
                {mode==="login"?(
                  <form onSubmit={login}>
                    <div style={{marginBottom:14}}><FLabel>Email</FLabel><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" style={authInpStyle}/></div>
                    <div style={{marginBottom:8}}><FLabel>Password</FLabel><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" style={authInpStyle}/></div>
                    <div style={{textAlign:"right",marginBottom:20}}><button type="button" onClick={()=>{setForgotMode(true);setForgotEmail(email);}} style={{background:"none",border:"none",color:"#5a7a95",fontSize:12,cursor:"pointer"}}>Forgot password?</button></div>
                    <button type="submit" disabled={loading} style={{width:"100%",background:F.green,color:"#fff",border:"none",borderRadius:4,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{loading&&<Spinner size={14}/>}Sign In</button>
                  </form>
                ):(
                  <form onSubmit={signup}>
                    <div style={{marginBottom:16}}>
                      <FLabel>I am a</FLabel>
                      <div style={{display:"flex",border:"1px solid #2a4a60",borderRadius:4,overflow:"hidden"}}>
                        {[["student","🎓 Student"],["teacher","👨‍🏫 Teacher"]].map(([r,label])=>(
                          <button key={r} type="button" onClick={()=>setRole(r)} style={{flex:1,background:role===r?F.bgSubHeader:"transparent",border:"none",color:role===r?"#fff":"#5a7a95",padding:"10px 0",fontSize:13,cursor:"pointer",fontWeight:role===r?700:400}}>
                            {label}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}><FLabel>Full Name</FLabel><input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={authInpStyle}/></div>
                    <div style={{marginBottom:12}}><FLabel>Email</FLabel><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" style={authInpStyle}/></div>
                    <div style={{marginBottom:12}}><FLabel>Password</FLabel><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="At least 6 characters" style={authInpStyle}/></div>
                    {role==="student"&&<div style={{marginBottom:12}}>
                      <FLabel>Class Code</FLabel>
                      <input value={classCode} onChange={e=>setClassCode(e.target.value.toUpperCase())} placeholder="e.g. FIN3A7" style={{...authInpStyle,fontFamily:"monospace",letterSpacing:2,fontSize:15,fontWeight:700}}/>
                      <div style={{fontSize:11,color:"#5a7a95",marginTop:4}}>Get this 6-letter code from your teacher.</div>
                    </div>}
                    <div style={{height:8}}/>
                    <button type="submit" disabled={loading} style={{width:"100%",background:F.green,color:"#fff",border:"none",borderRadius:4,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{loading&&<Spinner size={14}/>}Create Account</button>
                  </form>
                )}
              </div>
            </>
          )}
        </div>
        <p style={{textAlign:"center",color:"#3a5a70",fontSize:12,marginTop:20}}>Paper Trading Only — For educational purposes</p>
      </div>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [checking,setChecking]=useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){const{data:p}=await sb.from("profiles").select("*").eq("id",session.user.id).single();setProfile(p||null);}
      setChecking(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(!session){setProfile(null);return;}
      if(event==="SIGNED_IN"){const{data:p}=await sb.from("profiles").select("*").eq("id",session.user.id).single();setProfile(p||null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const signOut=async()=>{await sb.auth.signOut();setProfile(null);};

  if(checking) return <div style={{minHeight:"100vh",background:F.bgBanner,display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner size={40}/></div>;
  if(!profile) return <AuthScreen onAuth={setProfile}/>;
  if(profile.role==="teacher"||profile.role==="admin") return <TeacherDashboard profile={profile} onSignOut={signOut}/>;
  return <StudentDashboard profile={profile} onSignOut={signOut}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
