  {name:"Strangle (Long)",               type:"buy",  margin:false},
];
const STRAT_MAP       = Object.fromEntries(STRATEGY_DEFS.map(s=>[s.name,s]));
const MARGIN_STRATS   = STRATEGY_DEFS.filter(s=>s.margin).map(s=>s.name);
const DIV_STRATS      = ["Covered Call","Cash-Secured Put","PMCC (Poor Man's Covered Call)"];
const ASSIGN_STRATS   = ["Covered Call","Cash-Secured Put"];

const parseN  = v   => parseFloat(v)||0;
const fmtD    = n   => "$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const getDef  = s   => STRAT_MAP[s]||{type:"sell",margin:false};
const optQty  = t   => 100*(parseInt(t.contracts)||1);
const dte     = d   => !d?null:Math.ceil((new Date(d+"T23:59:59")-new Date())/86400000);
const genCode = ()  => Math.random().toString(36).substring(2,8).toUpperCase();

// ─── Calculations (spec-exact) ────────────────────────────────────────────────
const calcOptionPnl = t => {
  if (!t.premium||!t.currentValue) return null;
  const diff = parseN(t.premium)-parseN(t.currentValue);
  return getDef(t.strategy).type==="sell" ? diff*optQty(t) : -diff*optQty(t);
};
const calcMaxProfit = t => {
  const q=optQty(t), prem=parseN(t.premium)*q;
  if (t.strategy==="Covered Call"&&t.costBasis&&t.strikeShort)
    return prem+(parseN(t.strikeShort)-parseN(t.costBasis))*q;
  return prem;
};
const calcPctMax = t => {
  if (getDef(t.strategy).type!=="sell"||!t.premium||!t.currentValue) return null;
  const mp=calcMaxProfit(t); if (mp<=0) return null;
  return ((parseN(t.premium)-parseN(t.currentValue))*optQty(t)/mp)*100;
};
const calcDivIncome = t => {
  if (!t.divAmount||!t.divCount||parseInt(t.divCount)===0) return 0;
  return parseN(t.divAmount)*parseInt(t.divCount)*optQty(t);
};
const calcYield = t => (!t.premium||!t.stockPrice)?null:(parseN(t.premium)/parseN(t.stockPrice))*100;
const calcStockPnl = s => {
  const shares=parseInt(s.shares)||0, cost=parseN(s.buyPrice)*shares;
  if (!s.buyPrice||!shares) return null;
  if (s.status==="Holding"&&s.currentPrice) return parseN(s.currentPrice)*shares-cost;
  if ((s.status==="Sold"||s.status==="Assigned Away")&&s.sellPrice) return parseN(s.sellPrice)*shares-cost;
  return null;
};
const calcOptBalImpact = trades => trades.reduce((s,t)=>{
  if (!t.premium) return s;
  const p=parseN(t.premium)*optQty(t), sell=getDef(t.strategy).type==="sell";
  const cv=t.status==="Closed"&&t.currentValue?parseN(t.currentValue)*optQty(t):0;
  return sell ? s+p-cv : s-p+cv;
},0);
const calcStkBalImpact = stocks => stocks.reduce((s,st)=>{
  const shares=parseInt(st.shares)||0;
  if (!st.buyPrice||!shares) return s;
  let imp=-parseN(st.buyPrice)*shares;
  if ((st.status==="Sold"||st.status==="Assigned Away")&&st.sellPrice) imp+=parseN(st.sellPrice)*shares;
  return s+imp;
},0);
const calcTotalValue = (trades,stocks,startBal) => {
  const start=parseN(startBal);
  const optImp=calcOptBalImpact(trades), stkImp=calcStkBalImpact(stocks);
  const divInc=trades.reduce((s,t)=>s+calcDivIncome(t),0);
  const cash=start+optImp+stkImp+divInc;
  const optMark=trades.filter(t=>t.status==="Open"&&t.currentValue).reduce((s,t)=>{
    const cv=parseN(t.currentValue)*optQty(t);
    return getDef(t.strategy).type==="sell"?s-cv:s+cv;
  },0);
  const stkMkt=stocks.filter(s=>s.status==="Holding"&&s.currentPrice)
    .reduce((s,st)=>s+parseN(st.currentPrice)*(parseInt(st.shares)||0),0);
  return {cash,optMark,stkMkt,total:cash+optMark+stkMkt,divInc,optImp,stkImp};
};
const calcAssignment = t => {
  const strike=parseN(t.strikeShort), prem=parseN(t.premium);
  if (!strike||!prem) return null;
  const q=optQty(t), premTotal=prem*q, basis=parseN(t.costBasis)||null;
  const isCsp=t.strategy==="Cash-Secured Put";
  return {
    strike, prem, premTotal, basis, q,
    assignedSharesValue:strike*q,
    assignProfit:basis?(isCsp?(strike-basis)*q*-1+premTotal:(strike-basis)*q+premTotal):null,
    breakEven:basis?basis-prem:null,
    effectiveCost:isCsp?strike-prem:null,
    isCsp,
  };
};

      </div>
    </div>
  );
  return(
    <div style={{background:F.indigoLight,border:`1px solid ${F.indigoBorder}`,borderRadius:4,overflow:"hidden"}}>
      <div style={{background:F.indigo,color:"#fff",padding:"7px 14px",fontSize:12,fontWeight:700,display:"flex",gap:8,alignItems:"center"}}>
        <span>⚖️ Assignment Risk Simulator</span>
        <span style={{fontSize:10,fontWeight:400,color:"#a5b4fc"}}>{t.ticker} · {t.strategy} · Strike ${a.strike.toFixed(2)} · {t.contracts} contract{parseInt(t.contracts)!==1?"s":""}</span>
      </div>
      <div style={{padding:"4px 14px 10px"}}>
        <div style={{marginTop:8,marginBottom:4,fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:0.5}}>Scenario A — Expires Worthless</div>
        <Row label="You keep full premium" value={`+${fmtD(a.premTotal)}`} color={F.green} bold/>
        <Row label={a.isCsp?"Cash collateral released, no shares assigned":"Shares stay in your account — sell another call next cycle"} value="✓" color={F.green}/>
        <div style={{marginTop:10,marginBottom:4,fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:0.5}}>Scenario B — Gets Assigned at ${a.strike.toFixed(2)}</div>
        {a.isCsp?(
          <>
            <Row label="You buy shares at strike" value={`-${fmtD(a.assignedSharesValue)}`} color={F.red} sub={`${a.q} shares × $${a.strike.toFixed(2)}`}/>
            <Row label="Premium already collected" value={`+${fmtD(a.premTotal)}`} color={F.green}/>
            {a.effectiveCost&&<Row label="Effective cost per share" value={`$${a.effectiveCost.toFixed(2)}/share`} color={F.blueLink} bold sub="your real entry price after premium"/>}
          </>
        ):(
          <>
            <Row label="Shares sold at strike" value={`+${fmtD(a.assignedSharesValue)}`} color={F.green} sub={`${a.q} shares × $${a.strike.toFixed(2)}`}/>
            <Row label="Premium already collected" value={`+${fmtD(a.premTotal)}`} color={F.green}/>
            {a.assignProfit!==null&&<Row label="Net profit vs cost basis" value={`${a.assignProfit>=0?"+":""}${fmtD(a.assignProfit)}`} color={a.assignProfit>=0?F.green:F.red} bold sub={a.basis?`vs $${a.basis.toFixed(2)}/share cost basis`:""}/>}
          </>
        )}
        {a.breakEven!==null&&!a.isCsp&&a.basis&&(
          <>
            <div style={{marginTop:10,marginBottom:4,fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:0.5}}>Break-Even</div>
            <Row label="Stock must fall BELOW this before you lose money" value={`$${a.breakEven.toFixed(2)}/share`} color={F.gold} bold sub={`${((a.prem/a.basis)*100).toFixed(1)}% downside protection from premium`}/>
          </>
        )}
      </div>
    </div>
  );
}

// ─── P&L Cell ─────────────────────────────────────────────────────────────────
function PnlCell({trade,onUpdate}){
  const [edit,setEdit]=useState(false);
  const [val,setVal]=useState(trade.currentValue||"");
  const pnl=calcOptionPnl(trade), pctMax=calcPctMax(trade), mp=calcMaxProfit(trade);
  const divInc=calcDivIncome(trade), total=(pnl||0)+divInc;
  const col=pnl===null?"#aaa":pnl>=0?F.green:F.red;
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
        {!edit?(
          <>
            <span style={{fontWeight:700,color:col}}>{pnl===null?"—":`${pnl>=0?"+":"-"}${fmtD(pnl)}`}</span>
            {trade.status==="Open"&&<button onClick={()=>{setVal(trade.currentValue||"");setEdit(true);}} style={{background:"none",border:`1px solid ${F.borderLight}`,borderRadius:2,fontSize:10,color:F.blueLink,cursor:"pointer",padding:"1px 5px"}}>Edit</button>}
          </>
        ):(
          <>
            <input autoFocus value={val} onChange={e=>setVal(e.target.value)} style={{width:64,padding:"2px 5px",fontSize:12,border:`1px solid ${F.green}`,borderRadius:2,outline:"none"}}
              onKeyDown={e=>{if(e.key==="Enter"){onUpdate(trade.id,val);setEdit(false);}if(e.key==="Escape")setEdit(false);}}/>
            <button onClick={()=>{onUpdate(trade.id,val);setEdit(false);}} style={{background:F.green,color:"#fff",border:"none",borderRadius:2,fontSize:10,cursor:"pointer",padding:"2px 6px"}}>✓</button>
            <button onClick={()=>setEdit(false)} style={{background:"#fff",color:F.textMuted,border:`1px solid ${F.borderLight}`,borderRadius:2,fontSize:10,cursor:"pointer",padding:"2px 5px"}}>✕</button>
          </>
        )}
      </div>
      {pctMax!==null&&(
        <div style={{marginTop:3}}>
          <div style={{height:3,background:"#e0e0e0",borderRadius:2,width:80}}>
            <div style={{height:3,background:pctMax>=50?F.green:F.gold,borderRadius:2,width:`${Math.min(100,Math.max(0,pctMax))}%`}}/>
          </div>
          <div style={{fontSize:10,color:F.textMuted,marginTop:1}}>{pctMax.toFixed(0)}% of {fmtD(mp)} max</div>
        </div>
      )}
      {divInc>0&&<div style={{fontSize:10,color:F.purple,marginTop:2,fontWeight:600}}>💰 +{fmtD(divInc)} div</div>}
      {divInc>0&&pnl!==null&&<div style={{fontSize:11,fontWeight:700,color:total>=0?F.green:F.red,borderTop:`1px dashed ${F.borderLight}`,marginTop:2,paddingTop:2}}>Total: {total>=0?"+":"-"}{fmtD(total)}</div>}
    </div>
  );
}

// ─── Dividend Badge ───────────────────────────────────────────────────────────
function DivBadge({trade}){
  const d=dte(trade.divExDate);
  if (!trade.divAmount) return <span style={{color:F.textMuted,fontSize:11}}>—</span>;
  return <div>
    <div style={{fontSize:12,fontWeight:600,color:F.purple}}>${parseN(trade.divAmount).toFixed(2)}/sh</div>
    {trade.divExDate&&<div style={{fontSize:10,color:d!==null&&d<=7?F.gold:F.textMuted,marginTop:1}}>Ex: {trade.divExDate}{d!==null&&d>=0?` (${d}d)`:" ✓"}</div>}
    {trade.divPayDate&&<div style={{fontSize:10,color:F.textMuted}}>Pay: {trade.divPayDate}</div>}
    {trade.divCount&&parseInt(trade.divCount)>0&&<div style={{fontSize:10,color:F.purple}}>×{trade.divCount} = +{fmtD(calcDivIncome(trade))}</div>}
  </div>;
}

function TradeForm({initial,onSave,onCancel,saving}){
  const blank={id:null,ticker:"",strategy:"Covered Call",expiry:"",strikeShort:"",strikeLong:"",premium:"",contracts:"1",currentValue:"",status:"Open",openDate:today(),closeDate:"",stockPrice:"",costBasis:"",thesis:"",notes:"",divAmount:"",divExDate:"",divPayDate:"",divCount:""};
  const [f,setF]=useState(initial||blank);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const def=getDef(f.strategy), isBuy=def.type==="buy", isEdit=!!f.id;
  const showDiv=DIV_STRATS.includes(f.strategy), showAssign=ASSIGN_STRATS.includes(f.strategy);
  const premTotal=f.premium&&f.contracts?(parseN(f.premium)*100*parseInt(f.contracts)).toFixed(2):null;
  const yld=f.premium&&f.stockPrice?((parseN(f.premium)/parseN(f.stockPrice))*100).toFixed(2):null;
  const divInc=calcDivIncome(f);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",zIndex:1500,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:28,overflowY:"auto"}}>
      <div style={{background:F.white,border:`1px solid ${F.borderMid}`,borderRadius:6,width:820,boxShadow:"0 8px 40px rgba(0,0,0,0.25)",overflow:"hidden",marginBottom:40}}>
        <div style={{background:isEdit?F.bgSubHeader:F.bgHeader,color:F.textWhite,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:15}}>{isEdit?"✏️  Edit Trade":"＋  New Trade Idea"}</span>
          <button onClick={onCancel} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.4)",color:F.textWhite,borderRadius:3,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>✕ Cancel</button>
        </div>
        <div style={{padding:18}}>
          <SecLabel>Trade Details</SecLabel>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 1fr 1fr",gap:12,marginBottom:12}}>
            <FField label="Symbol" value={f.ticker} onChange={v=>set("ticker",v.toUpperCase())} placeholder="AAPL"/>
            <div><FLabel>{def.margin?"Strategy ⚠ Margin":isBuy?"Strategy (Debit — Buyer)":"Strategy"}</FLabel>
              <select value={f.strategy} onChange={e=>set("strategy",e.target.value)} style={inp}>
                <optgroup label="── Sellers (Credit) ──">{STRATEGY_DEFS.filter(s=>s.type==="sell").map(s=><option key={s.name}>{s.name}</option>)}</optgroup>
                <optgroup label="── Buyers (Debit) ──">{STRATEGY_DEFS.filter(s=>s.type==="buy").map(s=><option key={s.name}>{s.name}</option>)}</optgroup>
              </select>
            </div>
            <FField label="Open Date" value={f.openDate} onChange={v=>set("openDate",v)} type="date"/>
            <FField label="Expiry Date" value={f.expiry} onChange={v=>set("expiry",v)} type="date"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:12}}>
            <FField label="Strike (Short/Buy)" value={f.strikeShort} onChange={v=>set("strikeShort",v)} placeholder="150.00"/>
            <FField label="Long Strike (spreads)" value={f.strikeLong} onChange={v=>set("strikeLong",v)} placeholder="145.00"/>
            <FField label={isBuy?"Debit Paid / Share ($)":"Premium / Share ($)"} value={f.premium} onChange={v=>set("premium",v)} placeholder="2.50"/>
            <FField label="Contracts" value={f.contracts} onChange={v=>set("contracts",v)} type="number" placeholder="1"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:12}}>
            <FField label="Current Mark / Share" value={f.currentValue} onChange={v=>set("currentValue",v)} placeholder="1.20"/>
            <FField label="Stock Price at Open ($)" value={f.stockPrice} onChange={v=>set("stockPrice",v)} placeholder="228.00"/>
            {showAssign&&<FField label="Cost Basis / Share ($)" value={f.costBasis} onChange={v=>set("costBasis",v)} placeholder="18.50"/>}
            <FSelect label="Status" value={f.status} onChange={v=>set("status",v)} options={STATUSES}/>
          </div>
          {f.status!=="Open"&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:12}}><FField label="Close Date" value={f.closeDate} onChange={v=>set("closeDate",v)} type="date"/></div>}
          {showAssign&&(f.strikeShort||f.premium)&&<div style={{marginBottom:14}}><AssignmentRiskPanel t={f}/></div>}
          {showDiv&&<>
            <SecLabel color={F.purple}>💰 Dividend Tracking</SecLabel>
            <div style={{background:F.purpleLight,border:`1px solid ${F.purpleBorder}`,borderRadius:4,padding:"12px 14px",marginBottom:14}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
                <FField label="Dividend / Share ($)" value={f.divAmount} onChange={v=>set("divAmount",v)} placeholder="0.25"/>
                <FField label="Ex-Dividend Date" value={f.divExDate} onChange={v=>set("divExDate",v)} type="date"/>
                <FField label="Payment Date" value={f.divPayDate} onChange={v=>set("divPayDate",v)} type="date"/>
                <FField label="# Dividends Collected" value={f.divCount} onChange={v=>set("divCount",v)} type="number" placeholder="0"/>
              </div>
              {f.divAmount&&f.divCount&&parseInt(f.divCount)>0&&<div style={{marginTop:8,fontSize:12,color:F.purple,fontWeight:600}}>Total dividend income: +{fmtD(divInc)}</div>}
            </div>
          </>}
          <SecLabel>Thesis & Notes</SecLabel>
          <div style={{marginBottom:10}}><FLabel>Trade Thesis / Rationale</FLabel><textarea value={f.thesis} onChange={e=>set("thesis",e.target.value)} placeholder="Why this trade? Expected move, IV rank, catalyst…" style={{...inp,minHeight:48,resize:"vertical"}}/></div>
          <div style={{marginBottom:14}}><FLabel>Notes / Adjustments</FLabel><textarea value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Rolls, adjustments, lessons…" style={{...inp,minHeight:36,resize:"vertical"}}/></div>
          {premTotal&&<div style={{background:isBuy?"#eff6ff":F.greenLight,border:`1px solid ${isBuy?"#bfdbfe":F.greenBorder}`,borderRadius:3,padding:"8px 14px",marginBottom:14,fontSize:12,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
            <span><strong>{isBuy?"Total Debit:":"Total Premium:"}</strong> ${premTotal}</span>
            {!isBuy&&<span><strong>Max Profit:</strong> {fmtD(calcMaxProfit(f))}</span>}
            {yld&&!isBuy&&<span><strong>Yield:</strong> {yld}% of stock</span>}
            {divInc>0&&<span style={{color:F.purple,fontWeight:600}}>💰 Div: +{fmtD(divInc)}</span>}
            {def.margin&&<span style={{color:F.gold,fontWeight:700}}>⚠ Margin required</span>}
          </div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>onSave(f)} disabled={saving} style={{background:F.green,color:F.white,border:"none",borderRadius:3,padding:"9px 24px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
              {saving&&<Spinner size={14}/>}{isEdit?"💾  Save Changes":"＋  Add Trade"}
            </button>
            <button onClick={onCancel} style={{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"9px 18px",fontSize:13,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Stock Form ───────────────────────────────────────────────────────────────
function StockForm({initial,onSave,onCancel,trades,saving}){
  const blank={id:null,ticker:"",shares:"",buyPrice:"",buyDate:today(),currentPrice:"",status:"Holding",sellPrice:"",sellDate:"",notes:""};
  const [f,setF]=useState(initial||blank);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const isEdit=!!f.id, isSold=f.status==="Sold"||f.status==="Assigned Away";
  const cost=f.buyPrice&&f.shares?parseN(f.buyPrice)*(parseInt(f.shares)||0):null;
  const proceeds=isSold&&f.sellPrice&&f.shares?parseN(f.sellPrice)*(parseInt(f.shares)||0):null;
  const pnl=cost&&proceeds?proceeds-cost:null;
  const linked=(trades||[]).filter(t=>t.ticker.toUpperCase()===(f.ticker||"").toUpperCase()&&t.strategy==="Covered Call"&&t.status==="Open");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",zIndex:1500,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:40,overflowY:"auto"}}>
      <div style={{background:F.white,border:`1px solid ${F.borderMid}`,borderRadius:6,width:680,boxShadow:"0 8px 40px rgba(0,0,0,0.25)",overflow:"hidden",marginBottom:40}}>
        <div style={{background:isEdit?F.bgSubHeader:F.bgHeader,color:F.textWhite,padding:"13px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:15}}>{isEdit?"✏️  Edit Stock Position":"📈  Buy Stock"}</span>
          <button onClick={onCancel} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.4)",color:F.textWhite,borderRadius:3,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>✕ Cancel</button>
        </div>
        <div style={{padding:20}}>
          <SecLabel>Purchase Details</SecLabel>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:14}}>
            <FField label="Ticker" value={f.ticker} onChange={v=>set("ticker",v.toUpperCase())} placeholder="AAPL"/>
            <FField label="Shares" value={f.shares} onChange={v=>set("shares",v)} type="number" placeholder="100"/>
            <FField label="Buy Price / Share ($)" value={f.buyPrice} onChange={v=>set("buyPrice",v)} placeholder="220.00"/>
            <FField label="Buy Date" value={f.buyDate} onChange={v=>set("buyDate",v)} type="date"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:14}}>
            <FField label="Current Price / Share ($)" value={f.currentPrice} onChange={v=>set("currentPrice",v)} placeholder="228.00"/>
            <FSelect label="Status" value={f.status} onChange={v=>set("status",v)} options={STOCK_STATUSES}/>
            {isSold&&<FField label="Sell / Assignment Price ($)" value={f.sellPrice} onChange={v=>set("sellPrice",v)} placeholder="235.00"/>}
            {isSold&&<FField label="Sell / Assignment Date" value={f.sellDate} onChange={v=>set("sellDate",v)} type="date"/>}
          </div>
          <div style={{marginBottom:14}}><FLabel>Notes</FLabel><textarea value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="e.g. Backing AAPL covered call…" style={{...inp,minHeight:42,resize:"vertical"}}/></div>
          {cost&&<div style={{background:"#f0f7ff",border:"1px solid #bfdbfe",borderRadius:3,padding:"10px 14px",marginBottom:14,fontSize:12,display:"flex",gap:20,flexWrap:"wrap"}}>
            <span><strong>Total Cost:</strong> <span style={{color:F.red}}>-{fmtD(cost)}</span></span>
            {proceeds&&<span><strong>Proceeds:</strong> <span style={{color:F.green}}>+{fmtD(proceeds)}</span></span>}
            {pnl!==null&&<span><strong>P&L:</strong> <span style={{color:pnl>=0?F.green:F.red,fontWeight:700}}>{pnl>=0?"+":"-"}{fmtD(pnl)}</span></span>}
          </div>}
          {linked.length>0&&<div style={{background:F.indigoLight,border:`1px solid ${F.indigoBorder}`,borderRadius:3,padding:"8px 12px",marginBottom:14,fontSize:12}}>
            <strong style={{color:F.indigo}}>🔗 Linked Covered Calls ({linked.length}):</strong>
            {linked.map(c=><span key={c.id} style={{marginLeft:8,color:F.textSecond}}>{c.ticker} ${c.strikeShort} exp {c.expiry}</span>)}
          </div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>onSave(f)} disabled={saving} style={{background:F.green,color:F.white,border:"none",borderRadius:3,padding:"9px 24px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
              {saving&&<Spinner size={14}/>}{isEdit?"💾  Save Changes":"📈  Add Stock Position"}
            </button>
            <button onClick={onCancel} style={{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"9px 18px",fontSize:13,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Positions Tab ────────────────────────────────────────────────────────────
function PositionsTab({trades,onEdit,onDelete,onAdd,updMark,readOnly}){
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const [sortKey,setSortKey]=useState("openDate");
  const [sortDir,setSortDir]=useState(-1);
  const sortBy=k=>{if(sortKey===k)setSortDir(d=>-d);else{setSortKey(k);setSortDir(1);}};
  const filtered=trades.filter(t=>filter==="All"||t.status===filter)
    .filter(t=>!search||(t.ticker+t.strategy).toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{let av=a[sortKey]||"",bv=b[sortKey]||"";return !isNaN(parseFloat(av))&&!isNaN(parseFloat(bv))?sortDir*(parseN(av)-parseN(bv)):sortDir*(av>bv?1:av<bv?-1:0);});
  const open=trades.filter(t=>t.status==="Open");
  const totPrem=trades.reduce((s,t)=>s+(t.premium&&getDef(t.strategy).type==="sell"?parseN(t.premium)*optQty(t):0),0);
  const totDebit=trades.reduce((s,t)=>s+(t.premium&&getDef(t.strategy).type==="buy"?parseN(t.premium)*optQty(t):0),0);
  const totOptPnl=trades.reduce((s,t)=>s+(calcOptionPnl(t)||0),0);
  const totDivInc=trades.reduce((s,t)=>s+calcDivIncome(t),0);
  const SortTh=({label,k,extra={}})=><th onClick={()=>sortBy(k)} style={{...thS,cursor:"pointer",background:sortKey===k?"#d4e8d4":thS.background,...extra}}>{label}{sortKey===k?(sortDir===1?" ▲":" ▼"):""}</th>;
  const colSpan=readOnly?13:14;
  return(
    <div>
      {!readOnly&&<div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,marginBottom:14,padding:"10px 20px",display:"flex",gap:20,alignItems:"center",flexWrap:"wrap",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <SummaryItem label="Open Positions" value={open.length}/>
        <SummaryItem label="Total Trades" value={trades.length}/>
        <SummaryItem label="Premium Collected" value={`+${fmtD(totPrem)}`} sub="sellers only"/>
        {totDebit>0&&<SummaryItem label="Debit Paid" value={`-${fmtD(totDebit)}`} color={F.blueLink} sub="buyers only"/>}
        <SummaryItem label="Options P&L" value={`${totOptPnl>=0?"+":"-"}${fmtD(totOptPnl)}`} color={totOptPnl>=0?F.green:F.red}/>
        {totDivInc>0&&<SummaryItem label="Dividend Income" value={`+${fmtD(totDivInc)}`} color={F.purple}/>}
        <SummaryItem label="Margin Positions" value={open.filter(t=>MARGIN_STRATS.includes(t.strategy)).length} color={F.gold}/>
        <div style={{marginLeft:"auto"}}>{onAdd&&<button onClick={onAdd} style={{background:F.green,color:F.white,border:"none",borderRadius:3,padding:"7px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Add Trade Idea</button>}</div>
      </div>}
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:0,flex:1,borderBottom:`1px solid ${F.borderLight}`}}>
          {["All",...STATUSES].map(s=><button key={s} onClick={()=>setFilter(s)} style={{background:"none",border:"none",borderBottom:filter===s?`2px solid ${F.green}`:"2px solid transparent",color:filter===s?F.green:F.textSecond,fontSize:13,padding:"6px 16px",cursor:"pointer",fontWeight:filter===s?700:400,marginBottom:-1}}>
            {s} <span style={{fontSize:11,color:"#aaa"}}>({s==="All"?trades.length:trades.filter(t=>t.status===s).length})</span>
          </button>)}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{padding:"5px 10px",borderRadius:3,border:`1px solid ${F.borderLight}`,fontSize:12,outline:"none",width:140}}/>
      </div>
      <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:1150}}>
          <thead><tr>
            <SortTh label="Symbol" k="ticker"/><SortTh label="Strategy" k="strategy"/>
            <th style={thS}>Type</th><th style={thS}>Strikes</th>
            <SortTh label="Exp. Date" k="expiry"/><th style={thS}>DTE</th>
            <SortTh label="Qty" k="contracts" extra={{textAlign:"center"}}/>
            <th style={thS}>Premium / Debit</th><th style={thS}>Yield%</th>
            <th style={thS}>💰 Dividend</th><th style={thS}>P&amp;L / % Max</th>
            <th style={thS}>Status</th><th style={thS}>Acct</th>
            {!readOnly&&<th style={{...thS,textAlign:"center"}}>Actions</th>}
          </tr></thead>
          <tbody>
            {filtered.length===0?(
              <tr><td colSpan={colSpan} style={{textAlign:"center",color:F.textMuted,padding:40}}>{trades.length===0?"No trades yet. Click + Add Trade Idea to start.":`No ${filter==="All"?"":filter.toLowerCase()} trades.`}</td></tr>
            ):filtered.map((t,i)=>{
              const d=dte(t.expiry), sc=STATUS_STYLE[t.status]||STATUS_STYLE.Open;
              const isMarg=MARGIN_STRATS.includes(t.strategy), def=getDef(t.strategy);
              const yld=calcYield(t), pTot=t.premium&&t.contracts?(parseN(t.premium)*optQty(t)).toFixed(0):null;
              const rowBg=i%2===0?F.bgPanel:F.rowAlt;
              return(<React.Fragment key={t.id}>
                <tr style={{background:rowBg,borderBottom:`1px solid ${F.borderLight}`}} onMouseEnter={e=>e.currentTarget.style.background=F.rowHover} onMouseLeave={e=>e.currentTarget.style.background=rowBg}>
                  <td style={{...tdS,fontWeight:700,color:F.blueLink}}>{t.ticker}</td>
                  <td style={tdS}><div style={{fontSize:12}}>{t.strategy}</div>{t.thesis&&<div style={{fontSize:10,color:F.textMuted,marginTop:2,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={t.thesis}>↳ {t.thesis}</div>}</td>
                  <td style={tdS}><span style={{fontSize:11,fontWeight:600,color:def.type==="buy"?F.blueLink:F.green}}>{def.type==="buy"?"📈 Buy":"📉 Sell"}</span></td>
                  <td style={{...tdS,fontFamily:"monospace",fontSize:12}}>{t.strikeShort||"—"}{t.strikeLong?` / ${t.strikeLong}`:""}</td>
                  <td style={{...tdS,fontFamily:"monospace",fontSize:12}}>{t.expiry||"—"}</td>
                  <td style={{...tdS,textAlign:"center",fontWeight:d!==null&&d<=7?700:400,color:d!==null&&d<=7?F.red:d!==null&&d<=14?F.gold:F.textSecond}}>{d!==null?`${d}d`:"—"}</td>
                  <td style={{...tdS,textAlign:"center"}}>{t.contracts}</td>
                  <td style={{...tdS,fontFamily:"monospace",fontSize:12}}>{t.premium?(def.type==="buy"?<><div style={{color:F.blueLink,fontWeight:600}}>${parseN(t.premium).toFixed(2)}</div>{pTot&&<div style={{fontSize:10,color:F.blueLink}}>-${pTot} debit</div>}</>:<><div>${parseN(t.premium).toFixed(2)}</div>{pTot&&<div style={{fontSize:10,color:F.textMuted}}>+${pTot} credit</div>}</>):"—"}</td>
                  <td style={tdS}>{yld!==null?<span style={{fontSize:12,fontWeight:600}}>{yld.toFixed(2)}%</span>:<span style={{color:F.textMuted}}>—</span>}</td>
                  <td style={tdS}><DivBadge trade={t}/></td>
                  <td style={tdS}>{readOnly?<span style={{fontWeight:700,color:(calcOptionPnl(t)||0)>=0?F.green:F.red}}>{(calcOptionPnl(t)||0)>=0?"+":"-"}{fmtD(calcOptionPnl(t)||0)}</span>:<PnlCell trade={t} onUpdate={updMark}/>}</td>
                  <td style={tdS}><span style={{fontSize:11,fontWeight:700,color:sc.color,background:sc.bg,border:`1px solid ${sc.border}`,borderRadius:3,padding:"2px 8px"}}>{t.status}</span></td>
                  <td style={tdS}>{isMarg?<span style={{fontSize:11,color:F.gold,fontWeight:600}}>⚠ Margin</span>:<span style={{fontSize:11,color:F.green}}>✓ Std</span>}</td>
                  {!readOnly&&<td style={{...tdS,textAlign:"center"}}><div style={{display:"flex",gap:5,justifyContent:"center"}}><ActionBtn label="✏ Edit" color={F.blueLink} bg={F.blueLinkLight} onClick={()=>onEdit(t)}/><ActionBtn label="✕" color={F.red} onClick={()=>onDelete(t.id)}/></div></td>}
                </tr>
                {ASSIGN_STRATS.includes(t.strategy)&&calcAssignment(t)&&(
                  <tr style={{background:F.indigoLight}}><td colSpan={colSpan} style={{padding:"6px 12px 10px"}}><AssignmentRiskPanel t={t}/></td></tr>
                )}
              </React.Fragment>);
            })}
          </tbody>
        </table>
        {filtered.length>0&&<div style={{padding:"8px 14px",background:"#f8fbf8",borderTop:`1px solid ${F.borderLight}`,fontSize:11,color:F.textMuted}}>Showing {filtered.length} of {trades.length} trades</div>}
      </div>
    </div>
  );
}

// ─── Stock Holdings Tab ───────────────────────────────────────────────────────
function StockHoldingsTab({stocks,trades,onAdd,onEdit,onDelete,readOnly}){
  const [subTab,setSubTab]=useState("holding");
  const holdP=stocks.filter(s=>s.status==="Holding");
  const soldP=stocks.filter(s=>s.status==="Sold");
  const assP=stocks.filter(s=>s.status==="Assigned Away");
  const totalCost=stocks.reduce((s,st)=>s+(parseN(st.buyPrice)*(parseInt(st.shares)||0)),0);
  const mktVal=holdP.reduce((s,st)=>s+(st.currentPrice?parseN(st.currentPrice)*(parseInt(st.shares)||0):0),0);
  const totalPnl=stocks.reduce((s,st)=>s+(calcStockPnl(st)||0),0);
  const realPnl=[...soldP,...assP].reduce((s,st)=>s+(calcStockPnl(st)||0),0);
  const unrPnl=holdP.reduce((s,st)=>s+(calcStockPnl(st)||0),0);
  const subTabs=[{key:"holding",label:"Holding",count:holdP.length},{key:"sold",label:"Sold",count:soldP.length},{key:"assigned",label:"Assigned Away",count:assP.length},{key:"all",label:"All",count:stocks.length}];
  const visible=subTab==="holding"?holdP:subTab==="sold"?soldP:subTab==="assigned"?assP:stocks;
  const ssc={Holding:{color:F.green,bg:F.greenLight,border:F.greenBorder},Sold:{color:"#555",bg:"#f0f0f0",border:"#ccc"},"Assigned Away":{color:F.gold,bg:F.goldLight,border:"#ffe08a"}};
  return(
    <div>
      <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,marginBottom:14,padding:"10px 20px",display:"flex",gap:20,alignItems:"center",flexWrap:"wrap",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <SummaryItem label="Total Positions" value={stocks.length}/>
        <SummaryItem label="Invested / Cost" value={fmtD(totalCost)} sub="total spent"/>
        {mktVal>0&&<SummaryItem label="Market Value" value={fmtD(mktVal)} color={F.blueLink} sub="open positions"/>}
        <SummaryItem label="Total Stock P&L" value={`${totalPnl>=0?"+":"-"}${fmtD(totalPnl)}`} color={totalPnl>=0?F.green:F.red} sub={holdP.length>0&&[...soldP,...assP].length>0?`${realPnl>=0?"+":"-"}${fmtD(realPnl)} realized · ${unrPnl>=0?"+":"-"}${fmtD(unrPnl)} open`:null}/>
        {!readOnly&&<div style={{marginLeft:"auto"}}><button onClick={onAdd} style={{background:F.green,color:F.white,border:"none",borderRadius:3,padding:"7px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>📈 Buy Stock</button></div>}
      </div>
      <div style={{display:"flex",gap:0,marginBottom:12,borderBottom:`1px solid ${F.borderLight}`}}>
        {subTabs.map(({key,label,count})=><button key={key} onClick={()=>setSubTab(key)} style={{background:"none",border:"none",borderBottom:subTab===key?`2px solid ${F.green}`:"2px solid transparent",color:subTab===key?F.green:F.textSecond,fontSize:13,padding:"6px 16px",cursor:"pointer",fontWeight:subTab===key?700:400,marginBottom:-1}}>
          {label} <span style={{fontSize:11,color:"#aaa"}}>({count})</span>
        </button>)}
      </div>
      {visible.length===0?(
        <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,padding:40,textAlign:"center",color:F.textMuted}}>
          {stocks.length===0?<><div style={{fontWeight:600,marginBottom:6}}>No stock positions yet.</div>{!readOnly&&<div style={{fontSize:12}}>Click <strong>📈 Buy Stock</strong> to add shares.</div>}</>:<div>No {subTab} positions.</div>}
        </div>
      ):(
        <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>

            <thead><tr>{["Ticker","Shares","Buy Price","Buy Date",subTab==="holding"?"Current Price":"Sale Price","Invested","Value / P&L","Status","Linked Calls",...(!readOnly?["Actions"]:[])].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
            <tbody>
              {visible.map((st,i)=>{
                const shares=parseInt(st.shares)||0, cost=parseN(st.buyPrice)*shares;
                const isClosed=st.status==="Sold"||st.status==="Assigned Away";
                const mv=st.status==="Holding"&&st.currentPrice?parseN(st.currentPrice)*shares:null;
                const proc=isClosed&&st.sellPrice?parseN(st.sellPrice)*shares:null;
                const pnl=calcStockPnl(st), ss=ssc[st.status]||ssc.Holding;
                const linked=(trades||[]).filter(t=>t.ticker.toUpperCase()===st.ticker.toUpperCase()&&t.strategy==="Covered Call"&&t.status==="Open");
                const rowBg=i%2===0?F.bgPanel:F.rowAlt;
                return(<tr key={st.id} style={{background:rowBg,borderBottom:`1px solid ${F.borderLight}`}} onMouseEnter={e=>e.currentTarget.style.background=F.rowHover} onMouseLeave={e=>e.currentTarget.style.background=rowBg}>
                  <td style={{...tdS,fontWeight:700,color:F.blueLink}}>{st.ticker}</td>
                  <td style={tdS}>{shares.toLocaleString()}</td>
                  <td style={{...tdS,fontFamily:"monospace"}}>${parseN(st.buyPrice).toFixed(2)}</td>
                  <td style={{...tdS,fontSize:11,color:F.textSecond}}>{st.buyDate||"—"}</td>
                  <td style={tdS}>{st.status==="Holding"?(st.currentPrice?<span style={{fontFamily:"monospace"}}>${parseN(st.currentPrice).toFixed(2)}</span>:<span style={{color:F.textMuted,fontSize:11}}>not set</span>):(st.sellPrice?<span style={{fontFamily:"monospace",color:st.status==="Assigned Away"?F.gold:"inherit"}}>${parseN(st.sellPrice).toFixed(2)}</span>:<span style={{color:F.textMuted,fontSize:11}}>—</span>)}</td>
                  <td style={{...tdS,fontFamily:"monospace",color:F.textSecond}}>{fmtD(cost)}</td>
                  <td style={tdS}>
                    {mv!==null&&<div style={{fontFamily:"monospace",color:F.blueLink,fontWeight:600}}>{fmtD(mv)}</div>}
                    {proc!==null&&<div style={{fontFamily:"monospace",color:F.green,fontWeight:600}}>{fmtD(proc)}<span style={{fontSize:10,fontWeight:400,color:F.textMuted}}> proc</span></div>}
                    {pnl!==null&&<div style={{fontSize:11,fontWeight:700,color:pnl>=0?F.green:F.red,marginTop:2}}>{pnl>=0?"+":"-"}{fmtD(pnl)}{cost>0&&<span style={{fontWeight:400,color:F.textMuted}}> ({((pnl/cost)*100).toFixed(1)}%)</span>} <span style={{fontSize:10,fontWeight:400,color:F.textMuted}}>{isClosed?"realized":"unrealized"}</span></div>}
                    {pnl===null&&!mv&&!proc&&<span style={{color:F.textMuted}}>—</span>}
                  </td>
                  <td style={tdS}><span style={{fontSize:11,fontWeight:700,color:ss.color,background:ss.bg,border:`1px solid ${ss.border}`,borderRadius:3,padding:"2px 8px"}}>{st.status}</span></td>
                  <td style={tdS}>{linked.length>0?<span style={{fontSize:11,color:F.indigo,fontWeight:600}}>🔗 {linked.length} call{linked.length!==1?"s":""}</span>:<span style={{color:F.textMuted,fontSize:11}}>—</span>}</td>
                  {!readOnly&&<td style={{...tdS,textAlign:"center"}}><div style={{display:"flex",gap:5,justifyContent:"center"}}><ActionBtn label="✏ Edit" color={F.blueLink} bg={F.blueLinkLight} onClick={()=>onEdit(st)}/><ActionBtn label="✕" color={F.red} onClick={()=>onDelete(st.id)}/></div></td>}
                </tr>);
              })}
            </tbody>
          </table>
          <div style={{padding:"8px 14px",background:"#f8fbf8",borderTop:`1px solid ${F.borderLight}`,fontSize:11,color:F.textMuted}}>{visible.length} of {stocks.length} position{stocks.length!==1?"s":""}</div>
        </div>
      )}
    </div>
  );
}

// ─── Analytics Panel ──────────────────────────────────────────────────────────
function AnalyticsPanel({trades,stocks}){
  const totOptPnl=trades.reduce((s,t)=>s+(calcOptionPnl(t)||0),0);
  const totDivInc=trades.reduce((s,t)=>s+calcDivIncome(t),0);
  const totStkPnl=stocks.reduce((s,st)=>s+(calcStockPnl(st)||0),0);
  const totAll=totOptPnl+totDivInc+totStkPnl;
  const winners=trades.filter(t=>(calcOptionPnl(t)||0)>0).length;
  const losers=trades.filter(t=>(calcOptionPnl(t)||0)<0).length;
  const winRate=trades.length>0?((winners/trades.length)*100).toFixed(0):"—";
  const byStrat={};
  trades.forEach(t=>{if(!byStrat[t.strategy])byStrat[t.strategy]={count:0,pnl:0,div:0};byStrat[t.strategy].count++;byStrat[t.strategy].pnl+=calcOptionPnl(t)||0;byStrat[t.strategy].div+=calcDivIncome(t);});
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:18}}>
        {[{label:"Win Rate",value:`${winRate}%`,color:parseInt(winRate)>50?F.green:F.red},
          {label:"Winners / Losers",value:`${winners} / ${losers}`},
          {label:"Options P&L",value:`${totOptPnl>=0?"+":"-"}${fmtD(totOptPnl)}`,color:totOptPnl>=0?F.green:F.red},
          {label:"Stock P&L",value:`${totStkPnl>=0?"+":"-"}${fmtD(totStkPnl)}`,color:totStkPnl>=0?F.green:F.red},
          {label:"Combined Total",value:`${totAll>=0?"+":"-"}${fmtD(totAll)}`,color:totAll>=0?F.green:F.red,sub:totDivInc>0?`incl. +${fmtD(totDivInc)} dividends`:null},
        ].map(c=>(
          <div key={c.label} style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:11,color:F.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>{c.label}</div>
            <div style={{fontSize:20,fontWeight:700,color:c.color||F.textPrimary}}>{c.value}</div>
            {c.sub&&<div style={{fontSize:10,color:F.purple,marginTop:2}}>{c.sub}</div>}
          </div>
        ))}
      </div>
      {totDivInc>0&&<div style={{background:F.purpleLight,border:`1px solid ${F.purpleBorder}`,borderRadius:4,padding:"12px 16px",marginBottom:18,display:"flex",gap:20,flexWrap:"wrap",alignItems:"center"}}>
        <div><div style={{fontSize:11,color:F.purple,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Total Dividend Income</div><div style={{fontSize:20,fontWeight:700,color:F.purple}}>+{fmtD(totDivInc)}</div></div>
        {trades.filter(t=>t.divAmount&&calcDivIncome(t)>0).map(t=><div key={t.id} style={{fontSize:12}}><span style={{fontWeight:700}}>{t.ticker}</span><span style={{color:F.textMuted}}> — +{fmtD(calcDivIncome(t))} ({t.divCount}× collected)</span></div>)}
      </div>}
      <div style={{background:F.bgPanel,border:`1px solid ${F.borderLight}`,borderRadius:4,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        <div style={{padding:"10px 16px",background:"#e8ede8",borderBottom:`1px solid ${F.borderLight}`,fontWeight:700,fontSize:13}}>P&L by Strategy</div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Strategy","Type","Trades","Options P&L","Div Income","Combined"].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
          <tbody>
            {Object.entries(byStrat).sort((a,b)=>(b[1].pnl+b[1].div)-(a[1].pnl+a[1].div)).map(([strat,d],i)=>{
              const def=getDef(strat), comb=d.pnl+d.div;
              return <tr key={strat} style={{background:i%2===0?F.bgPanel:F.rowAlt,borderBottom:`1px solid ${F.borderLight}`}}>
                <td style={tdS}>{strat}</td>
                <td style={tdS}><span style={{fontSize:11,fontWeight:600,color:def.type==="buy"?F.blueLink:F.green}}>{def.type==="buy"?"📈 Buy":"📉 Sell"}</span></td>
                <td style={tdS}>{d.count}</td>
                <td style={{...tdS,fontWeight:700,color:d.pnl>=0?F.green:F.red}}>{d.pnl>=0?"+":"-"}{fmtD(d.pnl)}</td>
                <td style={{...tdS,color:F.purple,fontWeight:d.div>0?700:400}}>{d.div>0?`+${fmtD(d.div)}`:"—"}</td>
                <td style={{...tdS,fontWeight:700,color:comb>=0?F.green:F.red}}>{comb>=0?"+":"-"}{fmtD(comb)}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Account Banner ───────────────────────────────────────────────────────────
function AccountBanner({trades,stocks,startBal,onSaveBal}){
  const [editing,setEditing]=useState(false);
  const [balInput,setBalInput]=useState(startBal);
  const {cash,optMark,stkMkt,total,divInc,optImp,stkImp}=calcTotalValue(trades,stocks,startBal);
  const vs=total-parseN(startBal), vsPct=parseN(startBal)>0?(vs/parseN(startBal))*100:0;
  const totPrem=trades.reduce((s,t)=>s+(t.premium&&getDef(t.strategy).type==="sell"?parseN(t.premium)*optQty(t):0),0);
  const totDebit=trades.reduce((s,t)=>s+(t.premium&&getDef(t.strategy).type==="buy"?parseN(t.premium)*optQty(t):0),0);
  const stkCost=stocks.reduce((s,st)=>s+(parseN(st.buyPrice)*(parseInt(st.shares)||0)),0);
  return(
    <div style={{background:F.bgBanner,borderBottom:`2px solid ${F.green}`}}>
      <div style={{maxWidth:1400,margin:"0 auto",padding:"0 20px"}}>

              <span style={{fontSize:34,fontWeight:800,color:"#fff",letterSpacing:-1}}>{fmtD(total)}</span>
              <span style={{fontSize:13,fontWeight:700,color:vs>=0?"#4ade80":F.red}}>{vs>=0?"▲":"▼"} {fmtD(vs)} ({vs>=0?"+":""}{vsPct.toFixed(2)}%)</span>
              <span style={{fontSize:10,color:"#4a6a80"}}>vs start</span>
            </div>
          </div>
          <div style={{width:1,height:44,background:"#1e3247",flexShrink:0}}/>
          <div>
            <div style={{fontSize:10,color:"#5a7a95",textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Cash Balance</div>

            <div style={{fontSize:10,color:"#3a5a70",marginTop:1}}>after premiums &amp; stock costs</div>
          </div>
          <div style={{width:1,height:44,background:"#1e3247",flexShrink:0}}/>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10,color:"#5a7a95",textTransform:"uppercase",letterSpacing:1}}>Starting:</span>
            {editing?(
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:12,color:"#a8c4d8"}}>$</span>
                <input autoFocus value={balInput} onChange={e=>setBalInput(e.target.value.replace(/[^0-9.]/g,""))}
                  onKeyDown={e=>{if(e.key==="Enter"){onSaveBal(balInput);setEditing(false);}if(e.key==="Escape")setEditing(false);}}
                  style={{background:"#1a2e3f",border:"1px solid #3a6a90",borderRadius:3,color:"#fff",fontSize:13,fontWeight:600,width:90,padding:"2px 6px",outline:"none"}}/>
                <button onClick={()=>{onSaveBal(balInput);setEditing(false);}} style={{background:F.green,color:"#fff",border:"none",borderRadius:3,padding:"2px 8px",fontSize:11,cursor:"pointer",fontWeight:700}}>✓</button>
                <button onClick={()=>setEditing(false)} style={{background:"transparent",color:"#8aafc5",border:"1px solid #3a5570",borderRadius:3,padding:"2px 6px",fontSize:11,cursor:"pointer"}}>✕</button>
              </div>

              <button onClick={()=>{setBalInput(startBal);setEditing(true);}} style={{background:"#1a2e3f",border:"1px solid #2a4a60",color:"#7a9ab5",borderRadius:3,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>
                ${parseN(startBal).toLocaleString("en-US",{minimumFractionDigits:0})} ✏

        </div>
      </div>
    </div>
  );
}

// ─── Student Dashboard ────────────────────────────────────────────────────────
function StudentDashboard({profile,onSignOut}){
  const [trades,setTrades]=useState([]);
  const [stocks,setStocks]=useState([]);
  const [startBal,setStartBal]=useState(profile.starting_balance?.toString()||"25000");
  const [loading,setLoading]=useState(true);
  const [activeTab,setTab]=useState("positions");
  const [showTradeForm,setShowTradeForm]=useState(false);
  const [editTrade,setEditTrade]=useState(null);
  const [showStockForm,setShowStockForm]=useState(false);
  const [editStock,setEditStock]=useState(null);
  const [showReset,setShowReset]=useState(false);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{load();},[]);

  async function load(){
    setLoading(true);
    const [tr,st]=await Promise.all([
      sb.from("trades").select("*").eq("user_id",profile.id).order("created_at",{ascending:false}),
      sb.from("stocks").select("*").eq("user_id",profile.id).order("created_at",{ascending:false}),
    ]);
    setTrades((tr.data||[]).map(rowToTrade));
    setStocks((st.data||[]).map(rowToStock));
    setLoading(false);
  }

  // Trade CRUD
  const addTrade=async f=>{setSaving(true);const{data,error}=await sb.from("trades").insert(tradeToRow(f,profile.id)).select().single();if(!error){setTrades(p=>[rowToTrade(data),...p]);setShowTradeForm(false);}else alert(error.message);setSaving(false);};
  const saveTrade=async f=>{setSaving(true);const{error}=await sb.from("trades").update(tradeToRow(f,profile.id)).eq("id",f.id);if(!error){setTrades(p=>p.map(r=>r.id===f.id?f:r));setEditTrade(null);setShowTradeForm(false);}else alert(error.message);setSaving(false);};
  const delTrade=async id=>{if(!window.confirm("Remove this trade?"))return;await sb.from("trades").delete().eq("id",id);setTrades(p=>p.filter(r=>r.id!==id));};
  const updMark=async(id,cv)=>{setTrades(p=>p.map(r=>r.id===id?{...r,currentValue:cv}:r));await sb.from("trades").update({current_value:parseN(cv)||null,updated_at:new Date().toISOString()}).eq("id",id);};
  // Stock CRUD
  const addStock=async f=>{setSaving(true);const{data,error}=await sb.from("stocks").insert(stockToRow(f,profile.id)).select().single();if(!error){setStocks(p=>[rowToStock(data),...p]);setShowStockForm(false);}else alert(error.message);setSaving(false);};
  const saveStock=async f=>{setSaving(true);const{error}=await sb.from("stocks").update(stockToRow(f,profile.id)).eq("id",f.id);if(!error){setStocks(p=>p.map(r=>r.id===f.id?f:r));setEditStock(null);setShowStockForm(false);}else alert(error.message);setSaving(false);};
  const delStock=async id=>{if(!window.confirm("Remove this position?"))return;await sb.from("stocks").delete().eq("id",id);setStocks(p=>p.filter(r=>r.id!==id));};

  const resetAccount=async()=>{setSaving(true);await Promise.all([sb.from("trades").delete().eq("user_id",profile.id),sb.from("stocks").delete().eq("user_id",profile.id)]);setTrades([]);setStocks([]);setShowReset(false);setSaving(false);};
  const saveStartBal=async val=>{setStartBal(val);await sb.from("profiles").update({starting_balance:parseN(val)||25000}).eq("id",profile.id);};

  const tabs=[["positions","Positions"],["stocks","Stock Holdings"],["analytics","Summary & Analytics"]];

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:F.bgPage}}><Spinner size={40}/></div>;

  return(
    <div style={{minHeight:"100vh",background:F.bgPage,fontSize:13,color:F.textPrimary}}>
      <AccountBanner trades={trades} stocks={stocks} startBal={startBal} onSaveBal={saveStartBal}/>
      {/* Top Nav */}
      <div style={{background:F.bgHeader}}>
        <div style={{maxWidth:1400,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",height:46,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,marginRight:8}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:F.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📈</div>
            <span style={{fontWeight:700,fontSize:14,color:"#fff",whiteSpace:"nowrap"}}>Options Learning Platform</span>
            <span style={{fontSize:10,background:"#2a4055",borderRadius:2,padding:"2px 6px",color:"#7a9ab5",whiteSpace:"nowrap"}}>PAPER TRADING</span>
          </div>
          <span style={{fontSize:12,color:"#8aafc5",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{profile.full_name||profile.email}</span>
          <div style={{marginLeft:"auto",display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>setShowReset(true)} style={{background:"none",border:"1px solid #4a6a80",color:"#8aafc5",borderRadius:3,padding:"5px 10px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>↺ Reset</button>
            <button onClick={onSignOut} style={{background:"#1a2e3f",border:"1px solid #2a4a60",color:"#8aafc5",borderRadius:3,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Sign Out</button>
          </div>
        </div>
      </div>
      {/* Sub Nav */}
      <div style={{background:F.bgSubHeader,borderBottom:`2px solid ${F.green}`}}>
        <div style={{maxWidth:1400,margin:"0 auto",padding:"0 20px",display:"flex"}}>
          {tabs.map(([k,label])=><button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",color:activeTab===k?F.white:"#8aafc5",fontSize:13,padding:"10px 18px",cursor:"pointer",borderBottom:activeTab===k?`3px solid ${F.green}`:"3px solid transparent",fontWeight:activeTab===k?700:400,marginBottom:-2}}>
            {label}{k==="stocks"&&stocks.length>0&&<span style={{fontSize:11,color:"#aaa",marginLeft:4}}>({stocks.length})</span>}
          </button>)}

      {/* Content */}
      <div style={{maxWidth:1400,margin:"0 auto",padding:"16px 20px"}}>
        {activeTab==="positions"&&<PositionsTab trades={trades} onEdit={t=>{setEditTrade(t);setShowTradeForm(false);}} onDelete={delTrade} onAdd={()=>{setShowTradeForm(true);setEditTrade(null);}} updMark={updMark}/>}
        {activeTab==="stocks"&&<StockHoldingsTab stocks={stocks} trades={trades} onAdd={()=>{setShowStockForm(true);setEditStock(null);}} onEdit={st=>{setEditStock(st);setShowStockForm(false);}} onDelete={delStock}/>}
        {activeTab==="analytics"&&<AnalyticsPanel trades={trades} stocks={stocks}/>}
      </div>
      {/* Modals */}
      {(showTradeForm||editTrade)&&<TradeForm initial={editTrade||undefined} onSave={editTrade?saveTrade:addTrade} onCancel={()=>{setShowTradeForm(false);setEditTrade(null);}} saving={saving}/>}
      {(showStockForm||editStock)&&<StockForm initial={editStock||undefined} trades={trades} onSave={editStock?saveStock:addStock} onCancel={()=>{setShowStockForm(false);setEditStock(null);}} saving={saving}/>}
      {showReset&&<Modal title="Reset Paper Trading Account" onClose={()=>setShowReset(false)}>
        <div style={{padding:20}}>
          <div style={{display:"flex",gap:14,marginBottom:14}}><div style={{fontSize:28}}>⚠️</div><div><div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Are you sure?</div><div style={{fontSize:13,color:F.textSecond,lineHeight:1.5}}>Deletes all <strong>{trades.length} trade{trades.length!==1?"s":""}</strong> and <strong>{stocks.length} stock position{stocks.length!==1?"s":""}</strong>. Cannot be undone.</div></div></div>
          <div style={{background:F.redLight,border:"1px solid #ffb3b3",borderRadius:3,padding:"8px 12px",fontSize:12,color:F.red,marginBottom:16}}>All P&L, dividend records, and positions will be erased.</div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowReset(false)} style={{background:F.white,color:F.textSecond,border:`1px solid ${F.borderMid}`,borderRadius:3,padding:"8px 20px",fontSize:13,cursor:"pointer",fontWeight:600}}>Cancel</button>
            <button onClick={resetAccount} disabled={saving} style={{background:F.red,color:F.white,border:"none",borderRadius:3,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>{saving&&<Spinner size={14}/>}Yes, Reset Everything</button>
          </div>
        </div>
      </Modal>}
      <div style={{borderTop:`1px solid ${F.borderLight}`,marginTop:32,padding:"12px 20px",textAlign:"center",fontSize:11,color:F.textMuted}}>Paper Trading Only — For educational purposes only.</div>
    </div>
  );
}
